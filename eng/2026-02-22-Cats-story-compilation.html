    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Noto+Sans+TC:wght@400;700&display=swap');
        
        body {
            font-family: 'Nunito', 'Noto Sans TC', sans-serif;
            background-color: #fdf2f8; /* pink-50 */
        }

        /* 隱藏滾動條但保留功能 */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* 卡片互動效果 */
        .interactive-card {
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
        }
        .interactive-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        .playing-state {
            box-shadow: 0 0 0 4px #fcd34d, 0 0 20px rgba(252, 211, 77, 0.6) !important;
            transform: scale(1.02) !important;
            border-color: #fbbf24 !important;
        }

        /* 拖曳分割線 */
        #divider {
            cursor: col-resize;
            width: 12px;
            background-color: #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        #divider:hover, #divider.dragging {
            background-color: #cbd5e1;
        }
        #divider::after {
            content: "⋮";
            color: #64748b;
            font-weight: bold;
        }

        /* 動畫 */
        @keyframes pop {
            0% { transform: scale(0.5); opacity: 0; }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-pop { animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        /* 中文隱藏機制 */
        .zh-text { transition: opacity 0.3s ease; }
        .hide-zh .zh-text { opacity: 0; pointer-events: none; position: absolute; visibility: hidden; }

        /* 時間微調器：預設隱藏，點擊上方「微調時間」按鈕才顯示 */
        .time-adjuster { display: none !important; }
        #main-container.show-adjusters .time-adjuster { display: inline-flex !important; }
    </style>
</head>

        let readingScore = 0;
        let listeningScore = 0;
        let currentFontSize = 1; // rem
        let isZhHidden = true;

        // --- YouTube iframe API 初始化 ---
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        const firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '100%',
                width: '100%',
                videoId: 'N-fX1VJBvbo', // Cat Rescue Video
                playerVars: {
                    'playsinline': 1,
                    'controls': 1,
                    'rel': 0,
                    'modestbranding': 1
                },
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        function onPlayerReady(event) {
            console.log("Player Ready");
            renderContent(); // 影片準備好再渲染內容
        }

        function onPlayerStateChange(event) {
            if (event.data == YT.PlayerState.PLAYING) {
                if (!playInterval) {
                    playInterval = setInterval(checkVideoTime, 100);
                }
            } else {
                clearInterval(playInterval);
                playInterval = null;
                if (event.data == YT.PlayerState.PAUSED || event.data == YT.PlayerState.ENDED) {
                    clearActiveCard();
                }
            }
        }

        function checkVideoTime() {
            if (currentEnd > 0 && player.getCurrentTime() >= currentEnd) {
                player.pauseVideo();
                clearActiveCard();
            }
        }

        // --- 核心播放邏輯 ---
        function playSegment(id, start, end) {
            if (!player || !player.seekTo) return;
            
            // Highlight
            setActiveCard(id);
            // Reward
            markAsLearned(id);

            currentEnd = end;
            player.seekTo(start, true);
            player.playVideo();
        }

        function setActiveCard(id) {
            clearActiveCard();
            activeCardId = id;
            const el = document.getElementById(id);
            if(el) {
                el.classList.add('playing-state');
                el.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        function clearActiveCard() {
            if(activeCardId) {
                const el = document.getElementById(activeCardId);
                if(el) el.classList.remove('playing-state');
                activeCardId = null;
            }
        }

        function markAsLearned(id) {
            if (!learnedItems.has(id)) {
                learnedItems.add(id);
                updateProgress();
                
                // 動態加入打勾
                const el = document.getElementById(id);
                if (el) {
                    const check = document.createElement('div');
                    check.innerHTML = '✅';
                    check.className = 'absolute -top-3 -right-3 text-2xl animate-pop bg-white rounded-full shadow-md w-8 h-8 flex items-center justify-center';
                    el.appendChild(check);
                }
            }
        }

        function updateProgress() {
            const pct = Math.min((learnedItems.size / totalItems) * 100, 100).toFixed(0);
            document.getElementById('progress-text').innerText = `${learnedItems.size} / ${totalItems} (${pct}%)`;
            document.getElementById('progress-bar').style.width = `${pct}%`;
            document.getElementById('progress-text-mobile').innerText = `${learnedItems.size} / ${totalItems} (${pct}%)`;
            document.getElementById('progress-bar-mobile').style.width = `${pct}%`;

            if(learnedItems.size >= totalItems && pct == 100) {
                triggerConfetti(3);
                setTimeout(() => alert("🎉 太棒了！你已經完成所有課程！"), 1000);
            }
        }

        function triggerConfetti(times = 1) {
            let count = 0;
            const interval = setInterval(() => {
                confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 }, colors: ['#f472b6', '#fbbf24', '#60a5fa'] });
                count++;
                if(count >= times) clearInterval(interval);
            }, 500);
        }

        // --- 時間微調器邏輯 ---
        function secondsToMMSS(sec) {
            const m = Math.floor(sec / 60);
            const s = sec % 60;
            return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        }

        function adjustTime(objArr, index, type, amount, event) {
            event.stopPropagation(); // 防止觸發卡片播放
            const item = objArr[index];
            if(type === 'start') {
                item.s += amount;
                if(item.s < 0) item.s = 0;
                playSegment(item.id, item.s, item.e);
            } else {
                item.e += amount;
                if(item.e <= item.s) item.e = item.s + 1;
                // 從結束前三秒開始播預覽
                let pre = Math.max(item.s, item.e - 3);
                playSegment(item.id, pre, item.e);
            }
            renderContent(); // 重新渲染以更新顯示時間
        }

        // --- UI 控制邏輯 ---
        function toggleZh() {
            const container = document.getElementById('main-container');
            container.classList.toggle('hide-zh');
            isZhHidden = container.classList.contains('hide-zh');
        }

        function toggleAdjusters() {
            const container = document.getElementById('main-container');
            container.classList.toggle('show-adjusters');
        }

        function changeFontSize() {
            currentFontSize = currentFontSize === 1 ? 1.25 : (currentFontSize === 1.25 ? 1.5 : 1);
            document.getElementById('app-body').style.fontSize = `${currentFontSize}rem`;
        }

        function exportData() {
            navigator.clipboard.writeText(JSON.stringify(appData, null, 2))
                .then(() => alert("✅ 已將最新時間戳資料複製到剪貼簿！"));
        }

        function speak(text) {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-US';
                utterance.rate = 0.9;
                speechSynthesis.speak(utterance);
            }
        }

        // --- 拖曳分割線邏輯 ---
        let isDragging = false;
        const divider = document.getElementById('divider');
        const leftPane = document.getElementById('left-pane');
        const rightPane = document.getElementById('right-pane');
        const iframeOverlay = document.getElementById('iframe-overlay');

        divider.addEventListener('mousedown', () => { isDragging = true; iframeOverlay.classList.remove('hidden'); divider.classList.add('dragging'); });
        document.addEventListener('mouseup', () => { isDragging = false; iframeOverlay.classList.add('hidden'); divider.classList.remove('dragging'); });
        document.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const containerWidth = document.body.clientWidth;
            const newLeftWidth = (e.clientX / containerWidth) * 100;
            if (newLeftWidth > 30 && newLeftWidth < 70) {
                leftPane.style.width = `${newLeftWidth}%`;
                rightPane.style.width = `${100 - newLeftWidth}%`;
            }
        });

        // --- 渲染內容 ---
        function renderContent() {
            const container = document.getElementById('content-container');
            container.innerHTML = '';

            // 輔助函數：生成時間微調按鈕 HTML（顯示為 MM:SS）
            const buildAdjusters = (arrName, index, s, e) => `
                <div class="time-adjuster flex flex-col items-end gap-1 text-xs text-slate-400 absolute bottom-2 right-2 z-10">
                    <div class="flex items-center gap-1 bg-white p-1 rounded border shadow-sm">
                        <span>起 ${secondsToMMSS(s)}</span>
                        <button onclick="adjustTime(appData.${arrName}, ${index}, 'start', -1, event)" class="px-1.5 bg-slate-100 hover:bg-slate-200 rounded">-</button>
                        <button onclick="adjustTime(appData.${arrName}, ${index}, 'start', 1, event)" class="px-1.5 bg-slate-100 hover:bg-slate-200 rounded">+</button>
                    </div>
                    <div class="flex items-center gap-1 bg-white p-1 rounded border shadow-sm">
                        <span>迄 ${secondsToMMSS(e)}</span>
                        <button onclick="adjustTime(appData.${arrName}, ${index}, 'end', -1, event)" class="px-1.5 bg-slate-100 hover:bg-slate-200 rounded">-</button>
                        <button onclick="adjustTime(appData.${arrName}, ${index}, 'end', 1, event)" class="px-1.5 bg-slate-100 hover:bg-slate-200 rounded">+</button>
                    </div>
                </div>
            `;

            // Section A: Lesson Text
            let secA = `<div class="mb-10"><h2 class="text-2xl font-black text-blue-600 border-b-4 border-blue-200 pb-2 mb-4 flex items-center gap-2"><i class="fa-solid fa-book-open"></i> A. 本日課文預習</h2><div class="space-y-3">`;
            appData.dialogues.forEach((d, i) => {
                secA += `
                <div id="${d.id}" class="interactive-card bg-white p-4 rounded-xl border-l-4 border-blue-400 shadow-sm" onclick="playSegment('${d.id}', ${d.s}, ${d.e})">
                    <p class="font-bold text-slate-700 text-lg">${d.en}</p>
                    <p class="zh-text text-slate-500 mt-1">${d.zh}</p>
                    ${buildAdjusters('dialogues', i, d.s, d.e)}
                </div>`;
            });
            secA += `</div></div>`;

            // Section B: Basic Vocab
            let secB = `<div class="mb-10"><h2 class="text-2xl font-black text-green-600 border-b-4 border-green-200 pb-2 mb-4 flex items-center gap-2"><i class="fa-solid fa-seedling"></i> B. 基礎關鍵單字</h2><div class="grid grid-cols-1 md:grid-cols-2 gap-4">`;
            appData.vocabBasic.forEach((v, i) => {
                secB += `
                <div id="${v.id}" class="interactive-card bg-white p-4 rounded-xl border-t-4 border-green-400 shadow-sm flex flex-col" onclick="playSegment('${v.id}', ${v.s}, ${v.e})">
                    <div class="flex items-center gap-3 mb-2">
                        <span class="text-4xl">${v.emoji}</span>
                        <div>
                            <span class="font-black text-green-700" style="font-size: 1.5em;">${v.w}</span>
                            <span class="text-xs bg-slate-100 text-slate-500 px-2 py-0.5 rounded ml-2">${v.pos}</span>
                        </div>
                    </div>
                    <p class="text-slate-600 italic mt-auto">"${v.en}"</p>
                    <p class="zh-text text-green-600 font-bold mt-1">${v.zh}</p>
                    ${buildAdjusters('vocabBasic', i, v.s, v.e)}
                </div>`;
            });
            secB += `</div></div>`;

            // Section C: Advanced Vocab
            let secC = `<div class="mb-10"><h2 class="text-2xl font-black text-purple-600 border-b-4 border-purple-200 pb-2 mb-4 flex items-center gap-2"><i class="fa-solid fa-rocket"></i> C. 進階困難單字片語</h2><div class="grid grid-cols-1 md:grid-cols-2 gap-4">`;
            appData.vocabAdv.forEach((v, i) => {
                secC += `
                <div id="${v.id}" class="interactive-card bg-white p-4 rounded-xl border-t-4 border-purple-400 shadow-sm flex flex-col" onclick="playSegment('${v.id}', ${v.s}, ${v.e})">
                    <div class="flex items-center gap-3 mb-2">
                        <span class="text-4xl">${v.emoji}</span>
                        <div>
                            <span class="font-black text-purple-700" style="font-size: 1.5em;">${v.w}</span>
                            <span class="text-xs bg-slate-100 text-slate-500 px-2 py-0.5 rounded ml-2">${v.pos}</span>
                        </div>
                    </div>
                    <p class="text-slate-600 italic mt-auto">"${v.en}"</p>
                    <p class="zh-text text-purple-600 font-bold mt-1">${v.zh}</p>
                    ${buildAdjusters('vocabAdv', i, v.s, v.e)}
                </div>`;
            });
            secC += `</div></div>`;

            // Section D: Key Sentences
            let secD = `<div class="mb-10"><h2 class="text-2xl font-black text-orange-600 border-b-4 border-orange-200 pb-2 mb-4 flex items-center gap-2"><i class="fa-solid fa-key"></i> D. 關鍵句子</h2><div class="space-y-3">`;
            appData.keySentences.forEach((k, i) => {
                secD += `
                <div id="${k.id}" class="interactive-card bg-white p-4 rounded-xl shadow-sm border-l-4 border-orange-400" onclick="playSegment('${k.id}', ${k.s}, ${k.e})">
                    <p class="text-lg text-slate-800">${k.html}</p>
                    <p class="zh-text text-orange-600 mt-1">${k.zh}</p>
                    ${buildAdjusters('keySentences', i, k.s, k.e)}
                </div>`;
            });
            secD += `</div></div>`;

            container.innerHTML = secA + secB + secC + secD;

            // Render Quizzes (DOM nodes to attach events easily)
            renderQuizBlock('E. 閱讀理解測驗', 'fa-glasses', 'text-teal-600', 'border-teal-200', appData.readingQuiz, 'read');
            renderQuizBlock('F. 聽力練習測驗', 'fa-headphones', 'text-indigo-600', 'border-indigo-200', appData.listenQuiz, 'listen');
        }

        function renderQuizBlock(title, icon, colorClass, borderClass, quizData, type) {
            const container = document.getElementById('content-container');
            const wrapper = document.createElement('div');
            wrapper.className = 'mb-10';
            
            let header = document.createElement('h2');
            header.className = `text-2xl font-black ${colorClass} border-b-4 ${borderClass} pb-2 mb-4 flex items-center gap-2`;
            header.innerHTML = `<i class="fa-solid ${icon}"></i> ${title}`;
            wrapper.appendChild(header);

            const qList = document.createElement('div');
            qList.className = 'space-y-6';

            quizData.forEach((q, qIndex) => {
                const qCard = document.createElement('div');
                qCard.id = q.id;
                qCard.className = 'bg-white p-5 rounded-xl shadow-md border border-slate-100 relative';
                
                // 標題與語音按鈕
                const qTop = document.createElement('div');
                qTop.className = 'flex items-start justify-between gap-4 mb-4';
                
                const qTextWrap = document.createElement('div');
                if(type === 'read') {
                    qTextWrap.innerHTML = `<p class="font-bold text-lg text-slate-800 cursor-pointer hover:text-blue-500 transition" onclick="speak('${q.q.replace(/'/g, "\\'")}')">${qIndex + 1}. ${q.q} <i class="fa-solid fa-volume-high text-sm text-slate-400 ml-1"></i></p>
                                           <p class="zh-text text-slate-500 text-sm mt-1">${q.q_zh}</p>`;
                } else {
                    // 聽力題：顯示英文題目，點擊播放按鈕聽音檔
                    qTextWrap.innerHTML = `
                        <div class="flex items-center gap-3">
                            <button class="bg-indigo-500 hover:bg-indigo-600 text-white rounded-full w-12 h-12 flex items-center justify-center shadow-lg transform transition hover:scale-110" onclick="playSegment('${q.id}', ${q.s}, ${q.e})">
                                <i class="fa-solid fa-play text-xl ml-1"></i>
                            </button>
                            <div>
                                <p class="font-bold text-lg text-slate-800 cursor-pointer hover:text-blue-500 transition" onclick="speak('${q.q.replace(/'/g, "\\'")}')">題 ${qIndex + 1}：${q.q} <i class="fa-solid fa-volume-high text-sm text-slate-400 ml-1"></i></p>
                                <p class="zh-text text-slate-500 text-sm mt-1">${q.q_zh}</p>
                            </div>
                        </div>`;
                }
                qTop.appendChild(qTextWrap);
                qCard.appendChild(qTop);

                // 選項區塊
                const optGrid = document.createElement('div');
                optGrid.className = 'grid grid-cols-1 sm:grid-cols-2 gap-3 mt-2';
                
                const feedbackDiv = document.createElement('div');
                feedbackDiv.className = 'hidden mt-4 p-3 rounded-lg font-bold text-sm bg-slate-50 border';

                q.options.forEach((opt, oIndex) => {
                    const btn = document.createElement('button');
                    btn.className = 'text-left w-full p-3 rounded-lg border-2 border-slate-200 hover:border-blue-400 hover:bg-blue-50 transition-all group relative overflow-hidden';
                    btn.innerHTML = `
                        <p class="text-slate-700 font-bold group-hover:text-blue-700 flex justify-between items-center">
                            <span>${String.fromCharCode(65 + oIndex)}. ${opt.t}</span>
                            <i class="fa-solid fa-volume-low text-slate-300 opacity-0 group-hover:opacity-100" onclick="event.stopPropagation(); speak('${opt.t.replace(/'/g, "\\'")}')"></i>
                        </p>
                        <p class="zh-text text-slate-500 text-xs mt-1">${opt.zh}</p>
                    `;
                    
                    btn.onclick = () => {
                        // 重置所有按鈕
                        Array.from(optGrid.children).forEach(c => {
                            c.classList.remove('border-green-500', 'bg-green-50', 'border-red-500', 'bg-red-50');
                            c.classList.add('border-slate-200');
                            c.disabled = true; // 鎖定
                        });

                        if (opt.c) {
                            btn.classList.add('border-green-500', 'bg-green-50');
                            btn.classList.remove('border-slate-200');
                            feedbackDiv.innerHTML = `🟢 答對了！ ${q.exp}`;
                            feedbackDiv.className = 'mt-4 p-3 rounded-lg font-bold text-sm bg-green-100 text-green-800 border border-green-200 animate-pop block';
                            
                            // 記錄進度
                            markAsLearned(q.id);
                            
                            // 計算滿分彩蛋
                            if(type === 'read') {
                                readingScore++;
                                if(readingScore === 5) {
                                    triggerConfetti(2);
                                    setTimeout(()=>alert("🌟 恭喜你！閱讀測驗全對！獲得【英文小達人】稱號！"), 800);
                                }
                            } else {
                                listeningScore++;
                                if(listeningScore === 5) {
                                    triggerConfetti(2);
                                    setTimeout(()=>alert("🎧 太神了！聽力測驗全對！獲得【順風耳】稱號！"), 800);
                                }
                            }
                        } else {
                            btn.classList.add('border-red-500', 'bg-red-50');
                            btn.classList.remove('border-slate-200');
                            // 找出正確選項標示
                            Array.from(optGrid.children).forEach((c, idx) => {
                                if(q.options[idx].c) {
                                    c.classList.add('border-green-500', 'bg-green-50');
                                    c.classList.remove('border-slate-200');
                                }
                            });
                            feedbackDiv.innerHTML = `🔴 答錯了！正確答案是 ${String.fromCharCode(65 + q.options.findIndex(x=>x.c))}。 ${q.exp}`;
                            feedbackDiv.className = 'mt-4 p-3 rounded-lg font-bold text-sm bg-red-100 text-red-800 border border-red-200 block';
                            
                            // 答錯也算看過這題進度
                            markAsLearned(q.id);
                        }
                    };
                    optGrid.appendChild(btn);
                });

                qCard.appendChild(optGrid);
                qCard.appendChild(feedbackDiv);
                
                // 聽力題的時間微調器 (MM:SS 顯示)
                if(type === 'listen') {
                    const adjHTML = `
                        <div class="time-adjuster flex flex-col items-end gap-1 text-xs text-slate-400 absolute top-2 right-2 z-10">
                            <div class="flex items-center gap-1 bg-white p-1 rounded border shadow-sm">
                                <span>起 ${secondsToMMSS(q.s)}</span>
                                <button onclick="adjustTime(appData.listenQuiz, ${qIndex}, 'start', -1, event)" class="px-1.5 bg-slate-100 hover:bg-slate-200 rounded">-</button>
                                <button onclick="adjustTime(appData.listenQuiz, ${qIndex}, 'start', 1, event)" class="px-1.5 bg-slate-100 hover:bg-slate-200 rounded">+</button>
                            </div>
                            <div class="flex items-center gap-1 bg-white p-1 rounded border shadow-sm">
                                <span>迄 ${secondsToMMSS(q.e)}</span>
                                <button onclick="adjustTime(appData.listenQuiz, ${qIndex}, 'end', -1, event)" class="px-1.5 bg-slate-100 hover:bg-slate-200 rounded">-</button>
                                <button onclick="adjustTime(appData.listenQuiz, ${qIndex}, 'end', 1, event)" class="px-1.5 bg-slate-100 hover:bg-slate-200 rounded">+</button>
                            </div>
                        </div>
                    `;
                    qCard.insertAdjacentHTML('beforeend', adjHTML);
                }

                qList.appendChild(qCard);
            });

            wrapper.appendChild(qList);
            container.appendChild(wrapper);
        }

    </script>
</body>
</html>
