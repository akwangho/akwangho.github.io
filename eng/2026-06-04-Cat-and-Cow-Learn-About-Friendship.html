<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cat &amp; Cow 學當朋友 🐱🐮 聽力闖關</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800;900&family=Noto+Sans+TC:wght@400;700;900&display=swap');

        * { box-sizing: border-box; }
        body {
            font-family: 'Nunito', 'Noto Sans TC', sans-serif;
            background: linear-gradient(135deg, #FFF7ED 0%, #FDF4FF 45%, #EFF6FF 100%);
            margin: 0;
            color: #334155;
            min-height: 100vh;
        }
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-thumb { background: #FBCFE8; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #F472B6; }

        /* ===== Header ===== */
        header {
            position: sticky; top: 0; z-index: 40;
            background: rgba(255,255,255,.92);
            backdrop-filter: blur(8px);
            border-bottom: 4px solid #FBCFE8;
            padding: 10px 16px;
            display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
        }
        .brand { font-weight: 900; color: #BE185D; font-size: 1.05rem; }
        .main-tabs { display: flex; gap: 8px; }
        .mtab {
            border: none; cursor: pointer;
            padding: 8px 16px; border-radius: 999px;
            font-weight: 800; font-size: .95rem;
            background: #F1F5F9; color: #64748B;
            transition: all .15s;
        }
        .mtab:hover { transform: translateY(-1px); }
        .mtab.active { background: linear-gradient(135deg,#F472B6,#FB923C); color: #fff; box-shadow: 0 4px 12px rgba(244,114,182,.4); }
        .hstats { margin-left: auto; font-weight: 800; color: #475569; font-size: .9rem; }
        .hstats span { color: #D97706; }

        main { max-width: 1040px; margin: 0 auto; padding: 16px; }

        /* ===== Player ===== */
        #player-card { background:#fff; border-radius: 22px; box-shadow: 0 8px 28px rgba(0,0,0,.08); padding: 12px; }
        #player-wrap { position: relative; background:#000; border-radius: 16px; overflow: hidden; aspect-ratio: 16/9; width: 100%; }
        #player-wrap > #player, #player-wrap > iframe { position:absolute; inset:0; width:100%!important; height:100%!important; }

        #subtitle-mask {
            position: absolute; display: none;
            background: rgba(15,23,42,.92);
            border: 2px dashed rgba(244,114,182,.6);
            border-radius: 10px; cursor: move; z-index: 10;
            user-select: none; touch-action: none;
            align-items: center; justify-content: center;
        }
        #subtitle-mask.show { display: flex; }
        #subtitle-mask .resize-handle {
            position: absolute; right:-9px; bottom:-9px;
            width: 20px; height: 20px; background:#F472B6;
            border: 3px solid #fff; border-radius: 50%;
            cursor: nwse-resize; box-shadow: 0 2px 6px rgba(0,0,0,.3); z-index: 2;
        }
        #mask-subtitle {
            color: #fff; font-weight: 800; text-align: center;
            font-size: clamp(1rem, 3.2vw, 2rem); line-height: 1.3;
            padding: 0 16px; text-shadow: 0 2px 8px rgba(0,0,0,.6);
            pointer-events: none;
        }
        .iframe-block::after { content:''; position:absolute; inset:0; z-index:5; }

        /* ===== Buttons ===== */
        .mini-btn, .big-btn, .seg {
            border: none; cursor: pointer; font-weight: 800;
            border-radius: 12px; transition: transform .12s, box-shadow .12s, background .12s;
            white-space: nowrap;
        }
        .mini-btn { padding: 7px 13px; font-size: .85rem; background:#E2E8F0; color:#334155; }
        .mini-btn:hover { transform: translateY(-1px); }
        .mini-btn.pink { background:#FBCFE8; color:#BE185D; }
        .mini-btn.pink-strong, .big-btn.pink-strong { background: linear-gradient(135deg,#F472B6,#EC4899); color:#fff; }
        .mini-btn.sky { background:#BAE6FD; color:#075985; }
        .mini-btn.mint { background:#BBF7D0; color:#047857; }
        .mini-btn.yellow { background:#FEF08A; color:#92400E; }
        .mini-btn.lav { background:#DDD6FE; color:#5B21B6; }
        .mini-btn.gray { background:#E2E8F0; color:#475569; }
        .big-btn { padding: 12px 26px; font-size: 1.05rem; border-radius: 16px; color:#fff; }
        .big-btn.pink-strong:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(244,114,182,.4); }

        .seg { padding: 7px 13px; font-size:.85rem; background:#F1F5F9; color:#64748B; }
        .seg:hover { background:#E2E8F0; }
        .seg.on { background:#334155; color:#fff; box-shadow: 0 2px 8px rgba(51,65,85,.35); }
        .speed-btn.on, .pmode-btn.on { background: linear-gradient(135deg,#F472B6,#FB923C); color:#fff; }

        .lbl { font-weight: 800; color:#64748B; font-size:.85rem; }
        .hide { display: none !important; }

        /* ===== Control cards ===== */
        .ctrl-card, .settings-card { background:#fff; border-radius: 18px; box-shadow: 0 6px 20px rgba(0,0,0,.06); padding: 14px; margin-top: 14px; }
        .ctrl-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
        .ctrl-row:last-child { margin-bottom: 0; }
        .tip { font-size:.82rem; color:#64748B; line-height: 1.6; margin: 6px 0 0; }
        input[type=range] { accent-color:#F472B6; }
        .num-in { width: 80px; padding: 7px 10px; border:2px solid #DDD6FE; border-radius: 10px; font-size:.85rem; text-align:center; }

        .settings-card h3 { font-weight:900; color:#BE185D; font-size:1.2rem; margin:0 0 12px; }
        .set-row { display:flex; align-items:center; gap:8px; flex-wrap:wrap; padding:10px 0; border-top:1px dashed #E2E8F0; }
        .set-row:first-of-type { border-top:none; }
        .set-lbl { font-weight:900; color:#475569; width:140px; min-width:140px; }
        .seg-wrap { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
        .chk { font-weight:800; color:#475569; display:flex; align-items:center; gap:8px; cursor:pointer; }
        .chk input { width:18px; height:18px; accent-color:#F472B6; }
        .start { display:block; width:100%; margin-top:16px; }

        /* ===== Session ===== */
        .session-bar { display:flex; align-items:center; justify-content:space-between; margin-top:14px; }
        #session-progress { font-weight:900; color:#BE185D; font-size:1.1rem; }
        .stage-card { background:#fff; border-radius:18px; box-shadow:0 6px 20px rgba(0,0,0,.07); padding:18px; margin-top:10px; text-align:center; }
        .stage-tag { display:inline-block; padding:4px 14px; border-radius:999px; font-weight:900; font-size:.85rem; margin-bottom:6px; }
        .stage-tag.quiz { background:#DBEAFE; color:#1D4ED8; }
        .stage-tag.shadow { background:#EDE9FE; color:#6D28D9; }
        .stage-hint { color:#64748B; font-size:.9rem; margin-bottom:6px; }
        .listen .listen-title { font-weight:900; color:#BE185D; font-size:1.25rem; margin-top:4px; }
        .listen .listen-sub { color:#94A3B8; font-size:.85rem; margin-top:2px; }
        .zh-hint { margin-top:10px; background:#FEF9C3; color:#854D0E; font-weight:800; border-radius:12px; padding:8px 12px; display:inline-block; }

        .shadow-en { font-size:1.5rem; font-weight:900; color:#1E293B; margin:6px 0; line-height:1.4; }
        .shadow-zh { color:#64748B; font-size:.95rem; }
        .shadow-status { min-height:26px; font-size:.9rem; color:#475569; margin-top:6px; }

        .reveal-en { font-size:1.4rem; font-weight:900; color:#1E293B; margin:10px 0 2px; line-height:1.4; }
        .reveal-zh { color:#64748B; font-size:.95rem; }
        .sum-title { font-weight:900; color:#BE185D; font-size:1.3rem; }
        .sum-rows { margin:8px auto; display:inline-flex; flex-direction:column; gap:4px; color:#475569; font-size:1rem; }

        /* sight words */
        .sight-word { background: linear-gradient(180deg, transparent 55%, #FEF08A 55%); border-radius:3px; padding:0 1px; }

        /* ===== Quiz: MC ===== */
        .quiz-opt {
            display:block; width:100%; text-align:left;
            padding:11px 14px; border-radius:12px; border:2px solid #BAE6FD;
            background:#F0F9FF; color:#075985; font-weight:800; font-size:1rem;
            cursor:pointer; transition: all .12s;
        }
        .quiz-opt:hover:not(:disabled) { background:#E0F2FE; transform: translateY(-1px); }
        .quiz-opt:disabled { cursor:default; }
        .opt-correct { background:#BBF7D0 !important; border-color:#34D399 !important; color:#047857 !important; }
        .opt-wrong { background:#FECACA !important; border-color:#F87171 !important; color:#B91C1C !important; }

        /* ===== Quiz: Cloze ===== */
        .cloze-sentence { font-size:1.4rem; font-weight:800; color:#1E293B; line-height:2; text-align:center; margin-bottom:10px; }
        .cloze-blank { display:inline-block; min-width:74px; padding:2px 10px; margin:0 3px; border-bottom:3px dashed #94A3B8; color:#94A3B8; background:#F8FAFC; border-radius:6px 6px 0 0; text-align:center; cursor:pointer; }
        .cloze-blank.filled { color:#0F172A; background:#FEF9C3; border-bottom-color:#FBBF24; }
        .cloze-blank.correct { background:#BBF7D0; color:#047857; border-bottom-color:#34D399; }
        .cloze-blank.wrong { background:#FECACA; color:#B91C1C; animation: shake .4s; }
        .cloze-blank.hinted { color:#92400E; background:#FEF3C7; font-style:italic; }
        .cloze-blank.drag-over { background:#DBEAFE; border-bottom-color:#38BDF8; }
        .cloze-chips { display:flex; flex-wrap:wrap; gap:6px; justify-content:center; }
        .cloze-chip { padding:6px 14px; border-radius:999px; background:#BAE6FD; color:#075985; font-weight:800; cursor:grab; user-select:none; font-size:1rem; }
        .cloze-chip:hover { transform: translateY(-2px); }
        .cloze-chip.wrong-pick { animation: shake .35s; background:#FECACA; color:#B91C1C; }

        /* ===== Quiz: Scramble ===== */
        .scramble-area { min-height:58px; padding:10px; border:2px dashed #C4B5FD; border-radius:12px; background:#FAF5FF; display:flex; flex-wrap:wrap; gap:6px; justify-content:center; align-items:center; margin-bottom:8px; }
        .scramble-area.drag-over { background:#EDE9FE; border-color:#A78BFA; }
        .scramble-bank { min-height:52px; padding:8px; border-radius:12px; background:#F1F5F9; display:flex; flex-wrap:wrap; gap:6px; justify-content:center; }
        .scramble-chip { padding:6px 12px; border-radius:10px; background:#fff; border:2px solid #DDD6FE; color:#5B21B6; font-weight:800; cursor:grab; user-select:none; font-size:1rem; }
        .scramble-chip:hover { transform: translateY(-1px); border-color:#A78BFA; }
        .scramble-chip.dragging { opacity:.4; }
        .scramble-chip.correct-pos { background:#DCFCE7; border-color:#34D399; color:#047857; }

        /* ===== Speech result ===== */
        .speech-result { margin-top:6px; padding:8px 12px; border-radius:12px; font-size:.9rem; display:inline-block; text-align:left; }
        .speech-result.perfect { background: linear-gradient(135deg,#DCFCE7,#FEF3C7); color:#047857; }
        .speech-result.great { background:#FEF3C7; color:#92400E; }
        .speech-result.try { background:#FEE2E2; color:#B91C1C; }
        .sd-ok { color:#047857; font-weight:900; }
        .sd-no { color:#B91C1C; font-weight:900; text-decoration: line-through; }

        /* ===== Toast ===== */
        .toast { position:fixed; top:14%; left:50%; transform:translate(-50%,-12px); opacity:0; z-index:9999;
            padding:10px 22px; border-radius:999px; font-weight:900; box-shadow:0 8px 22px rgba(0,0,0,.2); transition: all .3s; pointer-events:none; }
        .toast.show { opacity:1; transform:translate(-50%,0); }
        .toast.good { background: linear-gradient(135deg,#34D399,#10B981); color:#fff; }
        .toast.bad { background: linear-gradient(135deg,#FB923C,#F472B6); color:#fff; }

        .countdown-num { font-size:4rem; font-weight:900; color:#A78BFA; text-shadow:0 0 24px rgba(167,139,250,.6); margin:6px 0; }
        @keyframes count-zoom { 0%{transform:scale(.5);opacity:0;}50%{transform:scale(1.3);opacity:1;}100%{transform:scale(1);opacity:1;} }
        .count-anim { animation: count-zoom .8s ease-out; }
        @keyframes shake { 0%,100%{transform:translateX(0);}25%{transform:translateX(-6px);}75%{transform:translateX(6px);} }
        .animate-shake { animation: shake .4s; }

        @media (max-width:640px){
            .set-lbl { width:100%; min-width:100%; }
            .hstats { width:100%; margin-left:0; }
        }
    </style>
</head>
<body>

<header>
    <div class="brand">🐱🐮 Cat &amp; Cow 學當朋友</div>
    <div class="main-tabs">
        <button data-main="playback" class="mtab" onclick="setMainMode('playback')">🎬 大螢幕播放</button>
        <button data-main="quiz" class="mtab" onclick="setMainMode('quiz')">🎯 闖關測驗</button>
    </div>
    <div class="hstats">⭐ <span id="stars-text">0</span> · 已學 <span id="learned-text">0 / 0</span></div>
</header>

<main>
    <!-- 共用播放器（兩種模式都在這上面播放） -->
    <div id="player-card">
        <div id="player-wrap">
            <div id="player"></div>
            <div id="subtitle-mask">
                <span id="mask-subtitle"></span>
                <div class="resize-handle"></div>
            </div>
        </div>
    </div>

    <!-- ===== 模式一：純播放學習 ===== -->
    <div id="view-playback">
        <div class="ctrl-card">
            <div class="ctrl-row">
                <button class="mini-btn pink-strong" id="pp-btn" onclick="togglePlayPause()">▶ 播放</button>
                <button class="mini-btn yellow" onclick="restartVideo()">⏮ 從頭播</button>
                <button class="mini-btn sky" onclick="enterFullscreen()">⛶ 全螢幕</button>
                <span class="lbl">速度</span>
                <button class="seg speed-btn" data-speed="0.75" onclick="applySpeed(0.75)">0.75x</button>
                <button class="seg speed-btn" data-speed="0.85" onclick="applySpeed(0.85)">0.85x</button>
                <button class="seg speed-btn" data-speed="1" onclick="applySpeed(1)">1.0x</button>
            </div>
            <div class="ctrl-row">
                <span class="lbl">觀看模式</span>
                <button class="seg pmode-btn" data-pmode="normal" onclick="setPlaybackMode('normal')">📺 正常（看原字幕）</button>
                <button class="seg pmode-btn" data-pmode="mask" onclick="setPlaybackMode('mask')">🙈 遮字幕（猜畫面）</button>
                <button class="seg pmode-btn" data-pmode="delay" onclick="setPlaybackMode('delay')">⏱️ 延遲字幕</button>
            </div>
            <div class="ctrl-row hide" id="delay-extra">
                <span class="lbl">延遲方式</span>
                <button class="seg dstyle-btn" data-dstyle="smart" onclick="setDelayStyle('smart')">🧠 整句講完才出現</button>
                <button class="seg dstyle-btn" data-dstyle="fixed" onclick="setDelayStyle('fixed')">⏱️ 慢一秒出現</button>
            </div>
            <div class="ctrl-row hide" id="mask-extra">
                <button class="mini-btn lav" id="maskfull-btn" onclick="toggleMaskFull()">⬛ 遮住整個畫面</button>
                <span class="lbl">遮罩濃度</span>
                <input id="mask-op" type="range" min="60" max="100" value="92" oninput="setMaskOpacity(parseInt(this.value))" style="width:130px;">
                <span id="mask-op-val" class="lbl">92%</span>
                <button class="mini-btn pink" onclick="resetMaskPos()">↺ 重設遮罩位置</button>
            </div>
            <p class="tip">🙈 <b>遮字幕</b>：先把影片字幕遮起來，讓小朋友看畫面猜猜看在說什麼。⏱️ <b>延遲字幕</b>：先用耳朵聽，字幕才慢慢出現在遮罩上 — 可選「🧠 整句講完才出現」（聽完整句再對答案，學習效果最好）或「慢一秒出現」。遮罩可用右下角圓點<b>拖大</b>，或按「遮住整個畫面」只用耳朵聽；全螢幕或視窗縮放時遮罩與字幕會自動跟著調整。</p>
        </div>
    </div>

    <!-- ===== 模式二：闖關測驗 ===== -->
    <div id="view-quiz" class="hide">
        <div id="quiz-settings" class="settings-card">
            <h3>🎯 闖關設定</h3>
            <div class="set-row">
                <span class="set-lbl">每次學習數量</span>
                <div class="seg-wrap">
                    <button class="seg" data-k="quizQuantity" data-v="10" onclick="setSetting('quizQuantity','10')">10 句</button>
                    <button class="seg" data-k="quizQuantity" data-v="20" onclick="setSetting('quizQuantity','20')">20 句</button>
                    <button class="seg" data-k="quizQuantity" data-v="30" onclick="setSetting('quizQuantity','30')">30 句</button>
                    <button class="seg" data-k="quizQuantity" data-v="50" onclick="setSetting('quizQuantity','50')">50 句</button>
                    <button class="seg" data-k="quizQuantity" data-v="all" onclick="setSetting('quizQuantity','all')">全部</button>
                    <input id="qty-custom" type="number" min="1" max="200" placeholder="自訂" class="num-in">
                    <button class="mini-btn lav" onclick="applyCustomQty()">套用</button>
                </div>
            </div>
            <div class="set-row">
                <span class="set-lbl">播放順序</span>
                <button class="seg" data-k="quizOrder" data-v="sequential" onclick="setSetting('quizOrder','sequential')">📖 固定（依字幕）</button>
                <button class="seg" data-k="quizOrder" data-v="random" onclick="setSetting('quizOrder','random')">🎲 隨機</button>
            </div>
            <div class="set-row">
                <span class="set-lbl">題型</span>
                <button class="seg" data-k="quizType" data-v="mc" onclick="setSetting('quizType','mc')">四選一</button>
                <button class="seg" data-k="quizType" data-v="scramble" onclick="setSetting('quizType','scramble')">拖曳重組</button>
                <button class="seg" data-k="quizType" data-v="cloze" onclick="setSetting('quizType','cloze')">克漏字</button>
                <button class="seg" data-k="quizType" data-v="random" onclick="setSetting('quizType','random')">🎲 隨機</button>
            </div>
            <div class="set-row">
                <span class="set-lbl">測驗 / 跟讀順序</span>
                <button class="seg" data-k="quizFlow" data-v="quiz-first" onclick="setSetting('quizFlow','quiz-first')">先測驗 → 跟讀</button>
                <button class="seg" data-k="quizFlow" data-v="shadow-first" onclick="setSetting('quizFlow','shadow-first')">先跟讀 → 測驗</button>
                <button class="seg" data-k="quizFlow" data-v="random" onclick="setSetting('quizFlow','random')">🎲 隨機</button>
            </div>
            <div class="set-row">
                <span class="set-lbl">範圍</span>
                <button class="seg" data-k="scope" data-v="all" onclick="setSetting('scope','all')">全部</button>
                <button class="seg" data-k="scope" data-v="0" onclick="setSetting('scope','0')">🎵 故事1：許願</button>
                <button class="seg" data-k="scope" data-v="1" onclick="setSetting('scope','1')">🤝 故事2：當朋友</button>
            </div>
            <div class="set-row">
                <label class="chk"><input type="checkbox" id="onlynew" onchange="toggleOnlyNew(this)"> 只練「從來沒學過」的句子</label>
            </div>
            <button class="big-btn pink-strong start" onclick="startSession()">🚀 開始闖關</button>
        </div>

        <div id="quiz-session" class="hide">
            <div class="session-bar">
                <span id="session-progress">第 1 / 1 句</span>
                <button class="mini-btn gray" onclick="confirmExit()">✕ 結束</button>
            </div>
            <div id="stage"></div>
        </div>
    </div>
</main>

<script>
/* =========================================================
 *  Cat & Cow Learn About Friendship — 聽力闖關
 *  影片： https://www.youtube.com/watch?v=VlbnkfIUxBw
 *  字幕： eng/sub/2026-06-04-Cat-and-Cow-Learn-About-Friendship.srt
 *  （SRT 破碎片段已合併為完整句子；故事1=許願，故事2=當朋友）
 * ======================================================= */
const VIDEO_ID = 'VlbnkfIUxBw';
const SUBTITLE_DELAY = 1.0; // 延遲字幕：聽到後幾秒才顯示

const DEFAULT_SENTENCES = [
    // ===== 故事 1：The Wish（許願） =====
    { id:'s1',  chapter:0, en:"Little Fox.", zh:"小狐狸頻道。", start:0.88,  end:4.28 },
    { id:'s2',  chapter:0, en:"The sun was up.", zh:"太陽升起來了。", start:6.32, end:10.20 },
    { id:'s3',  chapter:0, en:"The sky was blue.", zh:"天空是藍色的。", start:20.48, end:24.52 },
    { id:'s4',  chapter:0, en:"Cat said, \"I can jump. I can jump over the gate. Watch me jump.\"", zh:"貓說：「我會跳。我可以跳過柵欄。看我跳！」", start:32.16, end:44.28 },
    { id:'s5',  chapter:0, en:"Bat said, \"I can fly. I can fly over the tree. Watch me fly.\"", zh:"蝙蝠說：「我會飛。我可以飛過樹。看我飛！」", start:48.96, end:58.56 },
    { id:'s6',  chapter:0, en:"Cow said, \"I can walk. I can walk around the well.\"", zh:"牛說：「我會走路。我可以繞著井走。」", start:68.64, end:76.28 },

/* =========================================================
 *  小工具
 * ======================================================= */
function hashCode(str){ let h=0; for(let i=0;i<str.length;i++){ h=((h<<5)-h)+str.charCodeAt(i); h|=0; } return h>>>0; }
function mulberry32(seed){ return function(){ let t=seed+=0x6D2B79F5; t=Math.imul(t^(t>>>15),t|1); t^=t+Math.imul(t^(t>>>7),t|61); return ((t^(t>>>14))>>>0)/4294967296; }; }
function seededShuffle(arr,seed){ const a=[...arr]; const rnd=mulberry32(seed>>>0); for(let i=a.length-1;i>0;i--){ const j=Math.floor(rnd()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function shuffle(arr){ const a=[...arr]; for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function escapeHtml(s){ return String(s).replace(/[&<>"']/g,c=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }

function tokenize(sentence){ const out=[]; const re=/([A-Za-z']+)|([^A-Za-z']+)/g; let m; while((m=re.exec(sentence))!==null){ if(m[1])out.push({token:m[1],isWord:true}); else out.push({token:m[2],isWord:false}); } return out; }
function wordsOnly(sentence){ return tokenize(sentence).filter(t=>t.isWord).map(t=>t.token.toLowerCase()); }

function rankClozePositions(correctSentence, allChoices){
    const cWords=tokenize(correctSentence).filter(t=>t.isWord);
    if(cWords.length===0) return [];
    const wrongChoices=allChoices.filter(c=>c!==correctSentence);
    const wrongTokenized=wrongChoices.map(c=>tokenize(c).filter(t=>t.isWord));
    const ranked=[];
    for(let i=0;i<cWords.length;i++){
        const cw=cWords[i].token.toLowerCase();
        let diffCount=0; const wrongAtPos=[]; const seen=new Set([cw]);
        for(const wt of wrongTokenized){
            if(i<wt.length){ const ww=wt[i].token; if(ww.toLowerCase()!==cw){ diffCount++; if(!seen.has(ww.toLowerCase())){ wrongAtPos.push(ww); seen.add(ww.toLowerCase()); } } }
        }
        if(diffCount===0) continue;
        const lenBonus=Math.min(cWords[i].token.length,6);
        ranked.push({ index:i, score:diffCount*3+wrongAtPos.length*2+lenBonus, correctWord:cWords[i].token, wrongWords:wrongAtPos });
    }
    return ranked.sort((a,b)=>b.score-a.score);
}
function pickClozeTarget(correctSentence, allChoices, sentenceId){
    const ranked=rankClozePositions(correctSentence, allChoices);
    if(ranked.length===0) return null;
    const seed=hashCode(sentenceId||correctSentence);
    const rnd=mulberry32(seed); const r=rnd();
    let nBlanks = r<0.45?1 : r<0.8?2 : 3;
    const cWords=wordsOnly(correctSentence);
    nBlanks=Math.min(nBlanks, ranked.length, Math.max(1,Math.floor(cWords.length/2)));
    const pool=ranked.slice(0, Math.min(ranked.length, nBlanks+2));
    const picked=seededShuffle(pool, seed^0xc0ffee).slice(0,nBlanks).sort((a,b)=>a.index-b.index);
    const blanks=picked.map(p=>({ index:p.index, correctWord:p.correctWord, candidates:[p.correctWord,...p.wrongWords] }));
    const seen=new Set(); const wordBank=[];
    blanks.forEach(b=>b.candidates.forEach(w=>{ const k=w.toLowerCase(); if(!seen.has(k)){ seen.add(k); wordBank.push(w); } }));
    // 確保至少 3 個干擾選項可選（從其它句子借字）
    if(wordBank.length<4){
        const extra=wordsOnly(allChoices.join(' ')).filter(w=>!seen.has(w));
        for(const w of shuffle(extra)){ if(wordBank.length>=Math.max(4,blanks.length+3))break; if(!seen.has(w)){ seen.add(w); wordBank.push(w); } }
    }
    return { blanks, wordBank };
}
function levenshtein(a,b){ if(a===b)return 0; const m=a.length,n=b.length; if(!m)return n; if(!n)return m; const dp=Array(n+1); for(let j=0;j<=n;j++)dp[j]=j; for(let i=1;i<=m;i++){ let prev=dp[0]; dp[0]=i; for(let j=1;j<=n;j++){ const tmp=dp[j]; dp[j]=a[i-1]===b[j-1]?prev:1+Math.min(prev,dp[j],dp[j-1]); prev=tmp; } } return dp[n]; }
function similarityScore(target,said){ const a=wordsOnly(target),b=wordsOnly(said); if(!a.length&&!b.length)return 1; if(!a.length||!b.length)return 0; const dist=levenshtein(a.join(' '),b.join(' ')); const maxLen=Math.max(a.join(' ').length,b.join(' ').length); return Math.max(0,1-dist/maxLen); }
function wordLevelDiff(target,said){ const a=wordsOnly(target),b=wordsOnly(said); const set=new Set(b); return a.map(w=>({word:w,ok:set.has(w)})); }

function getChoicesFor(sentence){
    const correct=sentence.en;
    const others=DEFAULT_SENTENCES.filter(x=>x.id!==sentence.id && x.en!==correct);
    const sameChapter=others.filter(x=>x.chapter===sentence.chapter);
    const pool=sameChapter.length>=3?sameChapter:others;
    const cLen=correct.length;
    const sorted=[...pool].sort((a,b)=>Math.abs(a.en.length-cLen)-Math.abs(b.en.length-cLen));
    const seen=new Set([correct]); const uniq=[];
    for(const s of sorted){ if(!seen.has(s.en)){ seen.add(s.en); uniq.push(s); } }
    const top=uniq.slice(0, Math.min(18, uniq.length));
    const distractors=seededShuffle(top, hashCode(sentence.id)).slice(0,3).map(s=>s.en);
    return [correct, ...distractors];
}

const SIGHT_WORDS=new Set(['a','an','the','is','it','in','on','to','at','and','or','not','said','he','she','we','you','i','my','our','will','can','be','was','were','this','that','they','her','him']);
function highlightEnglish(text){ return text.split(/(\s+)/).map(part=>{ const w=part.replace(/[^a-zA-Z']/g,'').toLowerCase(); return (w&&SIGHT_WORDS.has(w))?`<span class="sight-word">${escapeHtml(part)}</span>`:escapeHtml(part); }).join(''); }

function applyMask(){
    const m=document.getElementById('subtitle-mask');
    const wrap=document.getElementById('player-wrap');
    const sub=document.getElementById('mask-subtitle');
    if(!m||!wrap) return;
    let on=true, full=false;
    if(state.mainMode==='playback'){ on=state.playbackMode!=='normal'; full=state.maskFull; }
    else { on=true; full=false; }   // 闖關時一定遮住影片內建字幕（避免直接看到答案）
    if(!on){ m.classList.remove('show'); return; }
    m.classList.add('show');
    const r=wrap.getBoundingClientRect();
    if(r.width<5){ requestAnimationFrame(applyMask); return; }
    // maskPos 以「比例」儲存，每次依目前播放器尺寸換算成 px → 全螢幕/視窗縮放會自動跟著調整
    let px;
    if(full){ px={ x:0, y:0, w:r.width, h:r.height }; }
    else {
        const mp=state.maskPos;
        const xr=(typeof mp.xr==='number')?mp.xr:0.05, yr=(typeof mp.yr==='number')?mp.yr:0.72;
        const wr=(typeof mp.wr==='number')?mp.wr:0.90, hr=(typeof mp.hr==='number')?mp.hr:0.24;
        px={ x:xr*r.width, y:yr*r.height, w:wr*r.width, h:hr*r.height };
        px.x=Math.max(0, Math.min(px.x, r.width-px.w));
        px.y=Math.max(0, Math.min(px.y, r.height-px.h));
    }
    m.style.left=px.x+'px'; m.style.top=px.y+'px'; m.style.width=px.w+'px'; m.style.height=px.h+'px';
    m.style.background=`rgba(15,23,42,${state.maskOpacity/100})`;
    // 字幕大小隨播放畫面尺寸調整（大螢幕 / 全螢幕會自動放大）
    if(sub){ sub.style.fontSize=Math.round(Math.max(15, Math.min(r.width*0.032, 54)))+'px'; }
}

function setupMaskInteraction(){
    const m=document.getElementById('subtitle-mask');
    const handle=m.querySelector('.resize-handle');
    const wrap=document.getElementById('player-wrap');
    let mode=null, sx,sy,sw,sh,ox,oy;
    const pt=e=>e.touches&&e.touches.length?{x:e.touches[0].clientX,y:e.touches[0].clientY}:{x:e.clientX,y:e.clientY};
    function down(e,md){
        if(state.maskFull) return;            // 整片遮住時不拖曳
        if(state.mainMode!=='playback') return;
        e.preventDefault(); e.stopPropagation();
        mode=md; const p=pt(e); sx=p.x; sy=p.y;
        const r=m.getBoundingClientRect(), wr=wrap.getBoundingClientRect();
        ox=r.left-wr.left; oy=r.top-wr.top; sw=r.width; sh=r.height;
        wrap.classList.add('iframe-block');
        document.addEventListener('pointermove',move); document.addEventListener('pointerup',up);
    }
    function move(e){
        if(!mode) return; const p=pt(e); const dx=p.x-sx, dy=p.y-sy; const wr=wrap.getBoundingClientRect();
        if(mode==='move'){
            const nx=Math.max(0,Math.min(wr.width-sw, ox+dx)), ny=Math.max(0,Math.min(wr.height-sh, oy+dy));
            state.maskPos.xr=nx/wr.width; state.maskPos.yr=ny/wr.height;
            state.maskPos.wr=sw/wr.width; state.maskPos.hr=sh/wr.height;
        } else {
            const nw=Math.max(60, Math.min(wr.width-ox, sw+dx)), nh=Math.max(30, Math.min(wr.height-oy, sh+dy));
            state.maskPos.wr=nw/wr.width; state.maskPos.hr=nh/wr.height;
            state.maskPos.xr=ox/wr.width; state.maskPos.yr=oy/wr.height;
        }
        state.maskPos.set=true; applyMask();
    }
    function up(){ mode=null; wrap.classList.remove('iframe-block'); document.removeEventListener('pointermove',move); document.removeEventListener('pointerup',up); saveState(); }
    m.addEventListener('pointerdown', e=>{ if(e.target.classList.contains('resize-handle')) return; down(e,'move'); });
    handle.addEventListener('pointerdown', e=>down(e,'resize'));
}

let session=null;
function buildQueue(){
    let pool=DEFAULT_SENTENCES.filter(s=> state.scope==='all' || s.chapter===parseInt(state.scope));
    if(state.onlyNew) pool=pool.filter(s=>!state.progress[s.id].learned);
    if(state.quizOrder==='random') pool=seededShuffle(pool, (Date.now()&0x7fffffff));
    const qty=state.quizQuantity==='all'?pool.length:Math.min(pool.length, parseInt(state.quizQuantity)||20);
    return pool.slice(0, qty);
}
function startSession(){
    if(!playerReady){ alert('影片還在載入中，請稍等一下再開始 🙏'); return; }
    const queue=buildQueue();
    if(!queue.length){ alert('找不到符合條件的句子。\n（也許「只練沒學過的句子」已全部學完，試著取消勾選或換個範圍）'); return; }

/* ---- 測驗 ---- */
function renderQuizPhase(s){
    const stage=document.getElementById('stage');
    let type=state.quizType; if(type==='random') type=['mc','cloze','scramble'][Math.floor(Math.random()*3)];
    if(type==='scramble' && wordsOnly(s.en).length<4) type='mc';
    const label={mc:'四選一',cloze:'克漏字',scramble:'拖曳重組'}[type]||'測驗';
    const hint={mc:'你剛剛聽到的是哪一句？',cloze:'把聽到的字填進空格（可點或拖）',scramble:'把單字排成你聽到的句子'}[type];
    stage.innerHTML=`<div class="stage-card"><div class="stage-tag quiz">📝 測驗 · ${label}</div><div class="stage-hint">${hint}</div><div class="mt-2" style="display:flex;justify-content:center;"><button class="mini-btn sky" id="quiz-replay">🔁 沒聽清楚？再聽一次</button></div><div id="quiz-host" class="mt-2"></div></div>`;
    const host=document.getElementById('quiz-host');
    document.getElementById('quiz-replay').onclick=()=>playSegment(s,{onEnd:()=>{}});
    const onResult=(correct)=>{
        const p=state.progress[s.id]; p.quizAttempts=(p.quizAttempts||0)+1; p.quizCorrect=correct; session.result.quiz=correct;
        if(correct){ state.stars+=1; updateHeader(); }
        saveState(); showToast(correct?'答對了！ 🎉':'沒關係，記起來囉 💪', correct);
        setTimeout(advancePhase, correct?900:1500);
    };
    if(type==='mc') renderMC(host,s,onResult);
    else if(type==='cloze') renderCloze(host,s,onResult);
    else renderScramble(host,s,onResult);
}
function renderMC(host,s,onResult){
    const raw=s.choices||getChoicesFor(s);
    const choices=shuffle(raw.map((c,i)=>({text:c,correct:i===0})));
    host.innerHTML=`<div style="display:grid;gap:8px;">${choices.map(c=>`<button class="quiz-opt" data-c="${c.correct}">${escapeHtml(c.text)}</button>`).join('')}</div>`;
    let done=false;
    host.querySelectorAll('.quiz-opt').forEach(b=>{
        b.onclick=()=>{ if(done)return; done=true; const correct=b.dataset.c==='true';
            host.querySelectorAll('.quiz-opt').forEach(x=>{ x.disabled=true; if(x.dataset.c==='true') x.classList.add('opt-correct'); });
            if(correct) burst(b); else b.classList.add('opt-wrong','animate-shake');
            onResult(correct);
        };
    });
}
function renderCloze(host,s,onResult){
    const raw=s.choices||getChoicesFor(s);
    const data=pickClozeTarget(s.en, raw, s.id);
    if(!data){ renderMC(host,s,onResult); return; }
    const blankByIndex=new Map(data.blanks.map((b,ord)=>[b.index,{ord,...b}]));
    const toks=tokenize(s.en); let wi=-1;
    const sentenceHTML=toks.map(t=>{ if(t.isWord) wi++; if(t.isWord&&blankByIndex.has(wi)){ const b=blankByIndex.get(wi); return `<span class="cloze-blank" data-correct="${escapeHtml(b.correctWord)}"></span>`; } return t.isWord?escapeHtml(t.token):escapeHtml(t.token).replace(/ /g,'&nbsp;'); }).join('');
    const chipsHTML=shuffle([...data.wordBank]).map(w=>`<span class="cloze-chip" draggable="true" data-word="${escapeHtml(w)}">${escapeHtml(w)}</span>`).join('');
    host.innerHTML=`<div class="cloze-sentence">${sentenceHTML}</div><div class="cloze-chips">${chipsHTML}</div><div class="mt-2" style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;"><button class="mini-btn yellow hint-btn">💡 提示</button><button class="mini-btn gray skip-btn">看答案</button></div>`;
    let resolved=false;
    const blanks=[...host.querySelectorAll('.cloze-blank')];
    const chipsEls=[...host.querySelectorAll('.cloze-chip')];
    const allCorrect=()=>blanks.every(b=>b.classList.contains('correct'));
    const nextEmpty=()=>blanks.find(b=>!b.classList.contains('correct')&&!b.classList.contains('filled'))||blanks.find(b=>!b.classList.contains('correct'));
    const tryFill=(blank,chip)=>{
        if(resolved||blank.classList.contains('correct')) return;
        const ok=chip.dataset.word.toLowerCase()===(blank.dataset.correct||'').toLowerCase();
        blank.textContent=chip.dataset.word; blank.classList.add('filled');
        if(ok){ blank.classList.remove('filled','wrong'); blank.classList.add('correct'); burst(blank); if(allCorrect()){ resolved=true; onResult(true); } }
        else { blank.classList.add('wrong'); chip.classList.add('wrong-pick'); setTimeout(()=>{ blank.classList.remove('wrong','filled'); blank.textContent=''; chip.classList.remove('wrong-pick'); },600); }
    };
    chipsEls.forEach(chip=>{
        chip.onclick=()=>{ const b=nextEmpty(); if(b) tryFill(b,chip); };
        chip.addEventListener('dragstart', e=>{ chip.classList.add('dragging'); try{ e.dataTransfer.setData('text/plain', chip.dataset.word); }catch(_){} });
        chip.addEventListener('dragend', ()=>chip.classList.remove('dragging'));
    });
    blanks.forEach(blank=>{
        blank.onclick=()=>{ if(blank.classList.contains('filled')&&!blank.classList.contains('correct')){ blank.classList.remove('filled','wrong'); blank.textContent=''; } };
        blank.addEventListener('dragover', e=>{ e.preventDefault(); if(!blank.classList.contains('correct')) blank.classList.add('drag-over'); });
        blank.addEventListener('dragleave', ()=>blank.classList.remove('drag-over'));
        blank.addEventListener('drop', e=>{ e.preventDefault(); blank.classList.remove('drag-over'); if(blank.classList.contains('correct')) return; const word=(e.dataTransfer.getData('text/plain')||'').trim(); const chip=chipsEls.find(c=>c.dataset.word===word); if(chip) tryFill(blank,chip); });
    });
    host.querySelector('.hint-btn').onclick=()=>{ blanks.filter(b=>!b.classList.contains('correct')).forEach(b=>{ const a=b.dataset.correct||''; b.textContent=a[0]+'…'; b.classList.add('hinted'); }); };
    host.querySelector('.skip-btn').onclick=()=>{ if(resolved) return; resolved=true; blanks.forEach(b=>{ b.textContent=b.dataset.correct; b.classList.remove('wrong','filled'); b.classList.add('correct'); }); onResult(false); };
}
function renderScramble(host,s,onResult){
    const wordTokens=tokenize(s.en).filter(t=>t.isWord).map(t=>t.token);
    if(wordTokens.length<4){ renderMC(host,s,onResult); return; }
    const shuffled=shuffle(wordTokens.map((w,i)=>({w,i})));
    host.innerHTML=`
        <div class="scramble-area" data-target="${escapeHtml(wordTokens.join(' '))}"></div>
        <div class="scramble-bank">${shuffled.map(o=>`<span class="scramble-chip" draggable="true" data-word="${escapeHtml(o.w)}">${escapeHtml(o.w)}</span>`).join('')}</div>
        <div class="mt-2" style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;">
            <button class="mini-btn mint check-btn">✔ 檢查</button>
            <button class="mini-btn yellow reset-btn">↺ 重來</button>
            <button class="mini-btn gray skip-btn">看答案</button>
        </div>`;
    const area=host.querySelector('.scramble-area'), bank=host.querySelector('.scramble-bank');
    const chips=[...host.querySelectorAll('.scramble-chip')];
    chips.forEach(chip=>{
        chip.onclick=()=>{ if(chip.parentElement===bank) area.appendChild(chip); else bank.appendChild(chip); };
        chip.addEventListener('dragstart', e=>{ chip.classList.add('dragging'); try{ e.dataTransfer.setData('text/plain', chip.dataset.word); }catch(_){} });
        chip.addEventListener('dragend', ()=>chip.classList.remove('dragging'));
    });
    [area,bank].forEach(cont=>{
        cont.addEventListener('dragover', e=>{ e.preventDefault(); const d=host.querySelector('.scramble-chip.dragging'); if(!d) return; const after=[...cont.querySelectorAll('.scramble-chip:not(.dragging)')].find(c=>{ const r=c.getBoundingClientRect(); return e.clientX<r.left+r.width/2; }); if(after) cont.insertBefore(d,after); else cont.appendChild(d); });
    });
    let done=false;
    host.querySelector('.check-btn').onclick=()=>{
        if(done) return;
        const user=[...area.querySelectorAll('.scramble-chip')].map(c=>c.dataset.word);
        let ok=user.length===wordTokens.length;
        area.querySelectorAll('.scramble-chip').forEach((c,i)=>{ c.classList.remove('correct-pos'); if(i<wordTokens.length && c.dataset.word.toLowerCase()===wordTokens[i].toLowerCase()) c.classList.add('correct-pos'); else ok=false; });
        if(ok){ done=true; burst(area); onResult(true); }
        else { area.classList.add('animate-shake'); setTimeout(()=>area.classList.remove('animate-shake'),400); }
    };
    host.querySelector('.reset-btn').onclick=()=>{ [...area.querySelectorAll('.scramble-chip')].forEach(c=>{ c.classList.remove('correct-pos'); bank.appendChild(c); }); };
    host.querySelector('.skip-btn').onclick=()=>{ if(done) return; done=true; bank.innerHTML=''; area.innerHTML=wordTokens.map(w=>`<span class="scramble-chip correct-pos">${escapeHtml(w)}</span>`).join(''); onResult(false); };
}

/* ---- 跟讀 Shadowing ---- */
function isSpeechRecSupported(){ return !!(window.SpeechRecognition||window.webkitSpeechRecognition); }
function renderShadowPhase(s){
    const stage=document.getElementById('stage');
    stage.innerHTML=`
        <div class="stage-card">
            <div class="stage-tag shadow">🎤 跟讀 Shadowing</div>
            <div class="shadow-en">${highlightEnglish(s.en)}</div>
            <div class="shadow-zh">${escapeHtml(s.zh)}</div>
            <div id="shadow-cd" class="countdown-num">🎧</div>
            <div id="shadow-status" class="shadow-status">準備好，跟著大聲念！</div>
            <div class="mt-2" style="display:flex;justify-content:center;gap:8px;flex-wrap:wrap;">
                <button class="mini-btn sky" id="sh-replay">🔊 再聽一次</button>
            </div>
        </div>`;
    document.getElementById('sh-replay').onclick=()=>playSegment(s,{onEnd:()=>{}});
    const onDone=(score)=>{ session.result.shadow=score; setTimeout(advancePhase, 900); };
    if(session.phaseIndex>0){ playSegment(s,{ onEnd:()=>sessionShadow(s,onDone) }); }
    else { sessionShadow(s,onDone); }
}
function sessionShadow(s, onDone){
    const statusEl=document.getElementById('shadow-status');
    const cdEl=document.getElementById('shadow-cd');
    const animateCd=(txt)=>{ cdEl.textContent=txt; cdEl.classList.remove('count-anim'); void cdEl.offsetWidth; cdEl.classList.add('count-anim'); };
    const record=()=>{
        if(!isSpeechRecSupported()){
            statusEl.innerHTML='這個瀏覽器不能評分，<b>跟著大聲念一次</b>就好！（想要分數請用 Chrome / Edge）';
            animateCd('⭐'); state.progress[s.id].shadowed=true; saveState();
            setTimeout(()=>onDone(null), 1600); return;
        }
        recognizeOnce(s, statusEl, cdEl, onDone);
    };
    let n=3; statusEl.textContent='準備好，跟著大聲念！';
    const tick=()=>{ animateCd(n>0?n:'🎙️'); if(n>0){ n--; setTimeout(tick,800); } else record(); };
    tick();
}
function recognizeOnce(s, statusEl, cdEl, onDone){
    const Rec=window.SpeechRecognition||window.webkitSpeechRecognition;
    const rec=new Rec(); rec.lang='en-US'; rec.interimResults=false; rec.maxAlternatives=3; rec.continuous=false;
    statusEl.innerHTML='🎙️ 請大聲說出來！';
    let finished=false;
    const finish=(transcript,err)=>{
        if(finished) return; finished=true; try{ rec.stop(); }catch(e){}
        if(err && !transcript){
            cdEl.textContent='❌';
            statusEl.textContent= err==='not-allowed'?'請允許使用麥克風權限再試一次':err==='no-speech'?'沒聽到聲音，下次大聲一點～':'辨識失敗：'+err;
            setTimeout(()=>onDone(null), 1800); return;
        }
        const score=Math.round(similarityScore(s.en, transcript)*100);
        const tier=score>=90?'perfect':score>=70?'great':'try';
        const tierLabel=score>=90?'🌟🌟🌟 PERFECT!':score>=70?'🌟🌟 GREAT!':'🌟 再試試！';
        const diff=wordLevelDiff(s.en, transcript).map(d=>`<span class="${d.ok?'sd-ok':'sd-no'}">${escapeHtml(d.word)}</span>`).join(' ');
        statusEl.innerHTML=`<div class="speech-result ${tier}"><div style="font-size:1.1rem;font-weight:900;">${tierLabel} · ${score} 分</div><div style="font-size:.8rem;margin-top:2px;">聽到你說：「${escapeHtml(transcript)}」</div><div style="font-size:.85rem;margin-top:4px;">${diff}</div></div>`;
        cdEl.textContent=score>=90?'🌟🌟🌟':score>=70?'🌟🌟':'🌟';
        const p=state.progress[s.id]; p.speechScore=Math.max(p.speechScore||0, score); p.shadowed=true;
        state.stars += score>=90?3:score>=70?2:1; saveState(); updateHeader();
        if(score>=90) burst(cdEl);
        setTimeout(()=>onDone(score), 2600);
    };
    rec.onresult=e=>finish(e.results[0][0].transcript, null);
    rec.onerror=e=>finish('', e.error||'unknown');
    rec.onend=()=>{ if(!finished) finish('','no-speech'); };
    try{ rec.start(); }catch(e){ finish('', e.message||'start-failed'); }
    setTimeout(()=>{ if(!finished) finish('','timeout'); }, 9000);
}

/* ---- 完成一句 / 完成全部 ---- */
function finishSentence(s){
    const p=state.progress[s.id]; p.learned=true; p.lastAt=Date.now(); saveState(); updateHeader();
    const q=session.result.quiz, sh=session.result.shadow;
    const last=session.index>=session.queue.length-1;
    document.getElementById('stage').innerHTML=`
        <div class="stage-card">
            <div style="font-size:2.6rem;">${q!==false?'🎉':'💪'}</div>
            <div class="sum-title">這一句完成！</div>
            <div class="sum-rows">
                <div>📝 測驗：<b>${q===true?'✅ 答對':q===false?'➖ 已看答案':'—'}</b></div>
                <div>🎤 跟讀：<b>${sh==null?'—':sh+' 分'}</b></div>
            </div>
            <div class="reveal-en">${highlightEnglish(s.en)}</div>
            <div class="reveal-zh">${escapeHtml(s.zh)}</div>
            <div class="mt-3" style="display:flex;justify-content:center;gap:8px;flex-wrap:wrap;">
                <button class="mini-btn sky" id="sum-replay">🔊 再聽發音</button>
                <button class="big-btn pink-strong" id="sum-next">${last?'🏁 完成闖關':'下一句 ▶'}</button>
            </div>
        </div>`;
    document.getElementById('sum-replay').onclick=()=>playSegment(s,{onEnd:()=>{}});
    document.getElementById('sum-next').onclick=()=> last ? finishSession() : nextSentence();
}
function nextSentence(){ session.index++; runSentence(); }
function finishSession(){
    bigConfetti();
    const n=session.queue.length;
    const correct=session.queue.filter(s=>state.progress[s.id].quizCorrect===true).length;
    const shadowScores=session.queue.map(s=>state.progress[s.id].speechScore).filter(v=>v!=null);
    const avg=shadowScores.length?Math.round(shadowScores.reduce((a,b)=>a+b,0)/shadowScores.length):null;
    document.getElementById('stage').innerHTML=`
        <div class="stage-card">
            <div style="font-size:3.2rem;">🏆</div>
            <div class="sum-title">闖關完成！</div>
            <div class="sum-rows">
                <div>這次練了 <b>${n}</b> 句</div>
                <div>測驗答對 <b>${correct}</b> 句</div>
                <div>跟讀平均 <b>${avg==null?'—':avg+' 分'}</b></div>
                <div>⭐ 累計星星 <b>${state.stars}</b></div>
            </div>
            <div class="mt-3" style="display:flex;justify-content:center;gap:8px;flex-wrap:wrap;">
                <button class="big-btn pink-strong" id="again-btn">🔁 再來一輪</button>
            </div>
        </div>`;
    document.getElementById('again-btn').onclick=exitToSettings;
}

/* =========================================================
 *  效果 & 抬頭
 * ======================================================= */
function burst(el){ if(typeof confetti!=='function'||!el) return; const r=el.getBoundingClientRect(); confetti({ particleCount:38, startVelocity:28, spread:60, origin:{ x:(r.left+r.width/2)/window.innerWidth, y:(r.top+r.height/2)/window.innerHeight }, colors:['#F472B6','#FB923C','#FBBF24','#34D399','#38BDF8','#A78BFA'] }); }
function bigConfetti(){ if(typeof confetti!=='function') return; const end=Date.now()+1400; (function frame(){ confetti({particleCount:5,angle:60,spread:70,origin:{x:0},colors:['#F472B6','#FB923C','#FBBF24','#34D399','#38BDF8','#A78BFA']}); confetti({particleCount:5,angle:120,spread:70,origin:{x:1},colors:['#F472B6','#FB923C','#FBBF24','#34D399','#38BDF8','#A78BFA']}); if(Date.now()<end) requestAnimationFrame(frame); })(); }
function showToast(msg, good){ const t=document.createElement('div'); t.className='toast '+(good?'good':'bad'); t.textContent=msg; document.body.appendChild(t); requestAnimationFrame(()=>t.classList.add('show')); setTimeout(()=>{ t.classList.remove('show'); setTimeout(()=>t.remove(),300); }, 1200); }
function updateHeader(){ document.getElementById('stars-text').textContent=state.stars; const learned=Object.values(state.progress).filter(p=>p.learned).length; document.getElementById('learned-text').textContent=`${learned} / ${DEFAULT_SENTENCES.length}`; }

/* =========================================================
 *  初始化
 * ======================================================= */
document.addEventListener('DOMContentLoaded', ()=>{
    setupMaskInteraction();
    updateSettingsUI();
    updatePlaybackUI();
    updateHeader();
    setMainMode(state.mainMode || 'playback');
    startPlaybackLoop();
    window.addEventListener('resize', ()=>applyMask());
    document.addEventListener('fullscreenchange', ()=>setTimeout(applyMask, 80));
    document.addEventListener('webkitfullscreenchange', ()=>setTimeout(applyMask, 80));
    // 播放器尺寸一變動（全螢幕、視窗縮放、版面改變）就重算遮罩位置與字幕大小
    try{ new ResizeObserver(()=>applyMask()).observe(document.getElementById('player-wrap')); }catch(e){}
});
</script>
