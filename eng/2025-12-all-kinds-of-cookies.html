            if (!clickedItems.has(itemId)) {
                clickedItems.add(itemId);
                const stamp = document.getElementById(`stamp-${itemId}`);
                if (stamp) {
                    stamp.classList.remove('opacity-0');
                    stamp.classList.add('opacity-100');
                    // 卡片震動提示
                    const card = document.getElementById(`card-${itemId}`) || document.getElementById(`lq-card-${itemId}`);
                    if(card) {
                        card.animate([{ transform: 'translate(1px, 1px) rotate(0deg)' }, { transform: 'translate(-1px, -2px) rotate(-1deg)' }, { transform: 'translate(-3px, 0px) rotate(1deg)' }, { transform: 'translate(3px, 2px) rotate(0deg)' }], { duration: 300 });
                    }
                }
                updateProgressBar();
            }

            // 視覺狀態引導 (發光)
            document.querySelectorAll('.playable-card').forEach(c => c.classList.remove('playing-glow'));
            const card = document.getElementById(`card-${itemId}`) || document.getElementById(`lq-card-${itemId}`);
            if (card) card.classList.add('playing-glow');

            // 自動暫停機制
            if (playInterval) clearInterval(playInterval);
            playInterval = setInterval(() => {
                if (player.getCurrentTime() >= currentEndTime) {
                    player.pauseVideo();
                    clearInterval(playInterval);
                    if (card) card.classList.remove('playing-glow');
                }
            }, 200);
        }

        function playItem(type, itemId) {
            const map = { 'lesson': data.lessonTexts, 'vocabB': data.basicVocab, 'vocabA': data.advVocab, 'sentence': data.keySentences, 'listen': data.listeningQuiz };
            const item = map[type].find(i => i.id === itemId);
            if (item) playVideoSegment(item.start, item.end, itemId);
        }

        function adjustTime(type, itemId, field, amount) {
            const map = { 'lesson': data.lessonTexts, 'vocabB': data.basicVocab, 'vocabA': data.advVocab, 'sentence': data.keySentences, 'listen': data.listeningQuiz };
            const item = map[type].find(i => i.id === itemId);
            if (!item) return;
            
            item[field] += amount;
            if (item[field] < 0) item[field] = 0;
            
            // 更新 UI
            const span = document.getElementById(`${field}-time-${itemId}`);
            if (span) span.innerText = `${field === 'start' ? 'Start' : 'End'}: ${formatTime(item[field])}`;

            // 自動播放預覽
            if (field === 'start') {
                playVideoSegment(item.start, item.end, itemId);
            } else {
                let testStart = item.end - 3;
                if (testStart < item.start) testStart = item.start;
                playVideoSegment(testStart, item.end, itemId);
            }
        }

        // === 6. 渲染與介面產生 ===
        function createCardHTML(item, type) {
            return `
                <div id="card-${item.id}" class="playable-card relative bg-white rounded-2xl p-4 shadow-sm hover:shadow-md transition cursor-pointer border-2 border-transparent hover:border-[#fcd34d]" onclick="playItem('${type}', '${item.id}')">
                    <div id="stamp-${item.id}" class="absolute top-2 right-2 text-xl opacity-0 transition-opacity pointer-events-none drop-shadow-md">✅</div>
                    <div class="flex items-center gap-3">
                        ${item.emoji ? `<span class="text-4xl shrink-0">${item.emoji}</span>` : ''}
                        <div class="w-full">
                            <div class="text-lg font-bold text-gray-800 leading-snug">${item.en}</div>
                            ${item.pos ? `<span class="inline-block bg-blue-100 text-blue-700 text-xs px-2 py-0.5 rounded mt-1 font-bold">${item.pos}</span>` : ''}
                            <div class="zh-text hidden text-gray-500 mt-2 text-sm border-t pt-1 border-gray-100">${item.zh}</div>
                        </div>
                    </div>
                    
                    <div class="time-tuners hidden mt-3 p-2 bg-gray-50 rounded-lg flex flex-wrap gap-2 text-xs justify-between items-center" onclick="event.stopPropagation()">
                        <div class="flex items-center gap-1">
                            <span id="start-time-${item.id}" class="text-gray-600 font-mono w-16">Start: ${formatTime(item.start)}</span>
                            <button onclick="adjustTime('${type}', '${item.id}', 'start', -1)" class="bg-red-100 text-red-600 px-2 py-1 rounded hover:bg-red-200 transition font-bold">-1s</button>
                            <button onclick="adjustTime('${type}', '${item.id}', 'start', 1)" class="bg-green-100 text-green-600 px-2 py-1 rounded hover:bg-green-200 transition font-bold">+1s</button>
                        </div>
                        <div class="flex items-center gap-1">
                            <span id="end-time-${item.id}" class="text-gray-600 font-mono w-16">End: ${formatTime(item.end)}</span>
                            <button onclick="adjustTime('${type}', '${item.id}', 'end', -1)" class="bg-red-100 text-red-600 px-2 py-1 rounded hover:bg-red-200 transition font-bold">-1s</button>
                            <button onclick="adjustTime('${type}', '${item.id}', 'end', 1)" class="bg-green-100 text-green-600 px-2 py-1 rounded hover:bg-green-200 transition font-bold">+1s</button>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderAll() {
            document.getElementById('lesson-container').innerHTML = data.lessonTexts.map(i => createCardHTML(i, 'lesson')).join('');
            document.getElementById('basic-vocab-container').innerHTML = data.basicVocab.map(i => createCardHTML(i, 'vocabB')).join('');
            document.getElementById('adv-vocab-container').innerHTML = data.advVocab.map(i => createCardHTML(i, 'vocabA')).join('');
            document.getElementById('sentence-container').innerHTML = data.keySentences.map(i => createCardHTML(i, 'sentence')).join('');
            renderReadingQuiz();
            renderListeningQuiz();
        }

        function renderReadingQuiz() {
            const html = data.readingQuiz.map((q, i) => {
                let opts = q.options.map(o => `
                    <button id="btn-${o.id}" class="block w-full text-left p-3 my-2 bg-white border-2 border-[#a7f3d0] rounded-xl hover:bg-[#ecfdf5] transition shadow-sm" onclick="speakText(event, '${o.text.replace(/'/g, "\\'")}'); checkReadingAnswer('${q.id}', '${o.id}')">
                        <div class="font-bold text-gray-700">${o.text}</div>
                        <div class="zh-text hidden text-sm text-gray-500 mt-1">${o.zh}</div>
                    </button>
                `).join('');

                return `
                    <div class="bg-[#f0fdf4] p-5 rounded-2xl shadow-sm border border-[#bbf7d0]">
                        <div class="font-bold text-[#047857] text-lg mb-2 cursor-pointer hover:opacity-80 transition" onclick="speakText(event, '${q.q.replace(/'/g, "\\'")}')">
                            Q${i+1}: ${q.q}
                        </div>
                        <div class="zh-text hidden text-sm text-gray-600 mb-4 pb-2 border-b border-[#a7f3d0]">${q.qZh}</div>
                        ${opts}
                        <div id="res-${q.id}" class="mt-3 text-sm font-bold hidden p-3 rounded-lg"></div>
                    </div>
                `;
            }).join('');
            document.getElementById('reading-container').innerHTML = html;
        }

        function renderListeningQuiz() {
            const html = data.listeningQuiz.map((q, i) => {
                let opts = q.options.map(o => `
                    <button id="btn-${o.id}" class="block w-full text-left p-3 my-2 bg-white border-2 border-[#c7d2fe] rounded-xl hover:bg-[#eef2ff] transition shadow-sm" onclick="checkListeningAnswer('${q.id}', '${o.id}')">
                        <div class="font-bold text-gray-700">${o.text}</div>
                        <div class="zh-text hidden text-sm text-gray-500 mt-1">${o.zh}</div>
                    </button>
                `).join('');

                return `
                    <div id="lq-card-${q.id}" class="playable-card bg-[#eef2ff] p-5 rounded-2xl shadow-sm border border-[#a5b4fc] transition-all">
                        <div class="flex justify-between items-center mb-4">
                            <span class="font-bold text-[#4338ca] text-lg flex items-center gap-2">
                                Q${i+1} <span id="stamp-${q.id}" class="text-lg opacity-0 transition-opacity drop-shadow-md">✅</span>
                            </span>
                            <button onclick="playItem('listen', '${q.id}')" class="bg-[#6366f1] hover:bg-[#4f46e5] text-white px-5 py-2 rounded-full shadow-md flex items-center gap-2 transition font-bold">
                                ▶️ 播放語音
                            </button>
                        </div>
                        
                        <div class="time-tuners hidden mb-4 p-3 bg-white rounded-lg flex flex-wrap gap-2 text-xs justify-between items-center border border-gray-200">
                            <div class="flex items-center gap-1">
                                <span id="start-time-${q.id}" class="text-gray-600 font-mono w-16">Start: ${formatTime(q.start)}</span>
                                <button onclick="adjustTime('listen', '${q.id}', 'start', -1)" class="bg-red-100 text-red-600 px-2 py-1 rounded font-bold">-1s</button>
                                <button onclick="adjustTime('listen', '${q.id}', 'start', 1)" class="bg-green-100 text-green-600 px-2 py-1 rounded font-bold">+1s</button>
                            </div>
                            <div class="flex items-center gap-1">
                                <span id="end-time-${q.id}" class="text-gray-600 font-mono w-16">End: ${formatTime(q.end)}</span>
                                <button onclick="adjustTime('listen', '${q.id}', 'end', -1)" class="bg-red-100 text-red-600 px-2 py-1 rounded font-bold">-1s</button>
                                <button onclick="adjustTime('listen', '${q.id}', 'end', 1)" class="bg-green-100 text-green-600 px-2 py-1 rounded font-bold">+1s</button>
                            </div>
                        </div>

                        <div class="space-y-2">
                            ${opts}
                        </div>
                        <div id="res-${q.id}" class="mt-3 text-sm font-bold hidden p-3 rounded-lg"></div>
                    </div>
                `;
            }).join('');
            document.getElementById('listening-container').innerHTML = html;
        }

        // === 7. 測驗評分機制 ===
        let readingScore = 0;
        let listeningScore = 0;

        function checkReadingAnswer(qId, optId) {
            const q = data.readingQuiz.find(x => x.id === qId);
            const opt = q.options.find(x => x.id === optId);
            const resDiv = document.getElementById(`res-${qId}`);
            
            // 停用其他選項
            q.options.forEach(o => {
                const btn = document.getElementById(`btn-${o.id}`);
                btn.onclick = null;
                btn.classList.add('opacity-50', 'cursor-not-allowed');
                if(o.id === optId) btn.classList.remove('opacity-50');
            });

            resDiv.classList.remove('hidden');
            if(opt.isCorrect) {
                resDiv.classList.add('bg-green-100', 'text-green-800');
                resDiv.innerHTML = `🟢 答對了！<br><span class="text-gray-600 font-normal mt-1 block">${q.explanation}</span><span class="zh-text ${showZh ? '' : 'hidden'} text-gray-500 font-normal block">${q.explanationZh}</span>`;
                readingScore++;
                if(readingScore === 5) triggerConfetti("英文閱讀小達人！🌟🌟🌟🌟🌟");
            } else {
                resDiv.classList.add('bg-red-100', 'text-red-800');
                resDiv.innerHTML = `🔴 答錯了。<br><span class="text-gray-600 font-normal mt-1 block">${q.explanation}</span><span class="zh-text ${showZh ? '' : 'hidden'} text-gray-500 font-normal block">${q.explanationZh}</span>`;
            }
        }

        function checkListeningAnswer(qId, optId) {
            const q = data.listeningQuiz.find(x => x.id === qId);
            const opt = q.options.find(x => x.id === optId);
            const resDiv = document.getElementById(`res-${qId}`);
            
            q.options.forEach(o => {
                const btn = document.getElementById(`btn-${o.id}`);
                btn.onclick = null;
                btn.classList.add('opacity-50', 'cursor-not-allowed');
                if(o.id === optId) btn.classList.remove('opacity-50');
            });

            resDiv.classList.remove('hidden');
            if(opt.isCorrect) {
                resDiv.classList.add('bg-green-100', 'text-green-800');
                resDiv.innerHTML = `🟢 聽力滿分！<br><span class="text-gray-600 font-normal mt-1 block">${q.explanation}</span><span class="zh-text ${showZh ? '' : 'hidden'} text-gray-500 font-normal block">${q.explanationZh}</span>`;
                listeningScore++;
                if(listeningScore === 5) triggerConfetti("英文聽力小達人！🌟🌟🌟🌟🌟");
            } else {
                resDiv.classList.add('bg-red-100', 'text-red-800');
                resDiv.innerHTML = `🔴 再接再厲。<br><span class="text-gray-600 font-normal mt-1 block">${q.explanation}</span><span class="zh-text ${showZh ? '' : 'hidden'} text-gray-500 font-normal block">${q.explanationZh}</span>`;
            }
        }

        // === 8. 全局控制功能 ===
        function togglePanel() {
            const panel = document.getElementById('global-panel');
            panel.classList.toggle('hidden');
        }

        function toggleZh() {
            showZh = !showZh;
            document.querySelectorAll('.zh-text').forEach(el => showZh ? el.classList.remove('hidden') : el.classList.add('hidden'));
        }

        function toggleTuners() {
            showTuners = !showTuners;
            document.querySelectorAll('.time-tuners').forEach(el => showTuners ? el.classList.remove('hidden') : el.classList.add('hidden'));
        }

        function adjustFontSize(amount) {
            fontSize += amount;
            if (fontSize < 12) fontSize = 12;
            if (fontSize > 30) fontSize = 30;
            const pane = document.getElementById('content-pane');
            pane.style.fontSize = fontSize + 'px';
            let style = document.getElementById('font-size-override');
            if (!style) {
                style = document.createElement('style');
                style.id = 'font-size-override';
                document.head.appendChild(style);
            }
            style.textContent = `
                #content-pane { font-size: ${fontSize}px !important; }
                #content-pane .text-2xl { font-size: ${Math.round(fontSize * 1.5)}px !important; }
                #content-pane .text-lg { font-size: ${Math.round(fontSize * 1.125)}px !important; }
                #content-pane .text-sm { font-size: ${Math.round(fontSize * 0.875)}px !important; }
                #content-pane .text-xs { font-size: ${Math.round(fontSize * 0.75)}px !important; }
                #content-pane .text-4xl { font-size: ${Math.round(fontSize * 2.25)}px !important; }
                #content-pane .time-tuners, #content-pane .time-tuners * { font-size: 12px !important; }
            `;
        }

        function exportJSON() {
            const exportData = {
                lessonTexts: data.lessonTexts.map(i => ({ en: i.en, start: i.start, end: i.end })),
                basicVocab: data.basicVocab.map(i => ({ word: i.en, start: i.start, end: i.end })),
                advVocab: data.advVocab.map(i => ({ word: i.en, start: i.start, end: i.end })),
                keySentences: data.keySentences.map(i => ({ en: i.en, start: i.start, end: i.end })),
                listeningQuiz: data.listeningQuiz.map(i => ({ start: i.start, end: i.end }))
            };
            navigator.clipboard.writeText(JSON.stringify(exportData, null, 2))
                .then(() => alert("時間設定已成功複製到剪貼簿！(JSON格式)"))
                .catch(err => console.error("複製失敗", err));
        }

        function updateProgressBar() {
            const pct = (clickedItems.size / totalItems) * 100;
            document.getElementById('progress-bar').style.width = `${pct}%`;
            document.getElementById('progress-text').innerText = `${clickedItems.size} / ${totalItems}`;
            if (clickedItems.size === totalItems) {
                setTimeout(() => triggerConfetti("太棒了！你已完成所有影片學習！🎉"), 500);
            }
        }

        function triggerConfetti(msg) {
            confetti({ particleCount: 150, spread: 100, origin: { y: 0.6 } });
            if (msg) setTimeout(() => alert(msg), 300);
        }

        // === 9. 拖曳分割線邏輯 ===
        const divider = document.getElementById('divider');
        const videoPane = document.getElementById('video-pane');

        divider.addEventListener('mousedown', (e) => {
            isDragging = true;
            document.body.style.cursor = 'col-resize';
            const iframe = document.querySelector('#player');
            if (iframe) iframe.style.pointerEvents = 'none'; // 防止 iframe 吞噬滑鼠事件
        });

        document.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const containerWidth = document.body.clientWidth;
            const newPct = (e.clientX / containerWidth) * 100;
            if (newPct > 20 && newPct < 80) { // 限制比例
                videoPane.style.width = `${newPct}%`;
            }
        });

        document.addEventListener('mouseup', () => {
            if (isDragging) {
                isDragging = false;
                document.body.style.cursor = 'default';
                const iframe = document.querySelector('#player');
                if (iframe) iframe.style.pointerEvents = 'auto'; // 恢復互動
            }
        });

        // 初始化畫面
        renderAll();
        document.getElementById('progress-text').innerText = `0 / ${totalItems}`;
    </script>
</body>
</html>
