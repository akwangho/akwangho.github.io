            box-shadow: 0 0 15px 5px rgba(96, 165, 250, 0.5);
            border-color: #60a5fa !important;

            animation: bounce-short 0.5s ease-in-out;

        // --- 全局狀態與變數 ---
        const State = {
            showChinese: false,
            showAdjusters: false,
            fontSize: 16,
            learnedCards: new Set(),
            readingScore: 0,
            listeningScore: 0,
            currentTargetEnd: Infinity
        };

        let player;
        let totalLearnableCards = 0; // Calculated during render

        // --- YouTube IFrame API ---
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        const firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('youtube-player', {
                videoId: 'a40Ly0wRYYE',
                playerVars: { 
                    'playsinline': 1, 'rel': 0, 'modestbranding': 1, 'controls': 1 
                },
                events: {
                    'onStateChange': onPlayerStateChange
                }
            });
            // 啟動定時器監聽時間，處理自動暫停與 highlight
            setInterval(monitorPlayback, 200);
        }

        function onPlayerStateChange(event) {
            // 當影片播放結束或手動暫停時，清空當前目標結束時間
            if(event.data !== YT.PlayerState.PLAYING) {
                // optional: if user pauses manually, maybe don't reset target
            }
        }

        function monitorPlayback() {
            if (player && player.getPlayerState && player.getPlayerState() === YT.PlayerState.PLAYING) {
                const current = player.getCurrentTime();
                // 檢查是否到達設定的片段結束點
                if (current >= State.currentTargetEnd) {
                    player.pauseVideo();
                    State.currentTargetEnd = Infinity; // reset
                }
                updateHighlights(current);
            }
        }

        function playSegment(id, type) {
            if (!player || !player.seekTo) return;
            const card = document.getElementById(id);
            const start = parseFloat(card.dataset.start);
            const end = parseFloat(card.dataset.end);
            
            State.currentTargetEnd = end;
            player.seekTo(start, true);
            player.playVideo();
            
            // 紀錄學習進度 (聽力測驗與閱讀測驗不算在普通卡片進度，分開處理)
            if (type === 'card' && !State.learnedCards.has(id)) {
                markCardLearned(card, id);
            }
        }

        function adjustTime(id, type, delta) {
            event.stopPropagation(); // 避免觸發整張卡片的點擊
            const card = document.getElementById(id);
            let start = parseFloat(card.dataset.start);
            let end = parseFloat(card.dataset.end);
            
            if (type === 'start') {
                start = Math.max(0, start + delta);
                card.dataset.start = start;
                card.querySelector('.start-time-disp').innerText = formatTime(start);
                // 預覽：從調整後的開始時間播放
                State.currentTargetEnd = end;
                player.seekTo(start, true);
            } else {
                end = Math.max(start + 1, end + delta);
                card.dataset.end = end;
                card.querySelector('.end-time-disp').innerText = formatTime(end);
                // 預覽：從調整後的結束時間前 3 秒開始播放
                let previewStart = Math.max(start, end - 3);
                State.currentTargetEnd = end;
                player.seekTo(previewStart, true);
            }
            player.playVideo();
            updateDataRef(id, start, end);
        }

        function updateDataRef(id, start, end) {
            // 更新記憶體中的 DB 以供匯出
            const arrs = [DB.lesson, DB.basicVocab, DB.advVocab, DB.sentences, DB.listening];
            for(let arr of arrs) {
                let item = arr.find(x => x.id === id);
                if(item) { item.start = start; item.end = end; return; }
            }
        }

        // --- Web Speech API ---
        function speakText(text) {
            event.stopPropagation();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 0.9;
            window.speechSynthesis.speak(utterance);
        }

        // --- UI 更新與進度 ---
        function updateHighlights(current) {
            document.querySelectorAll('.playable-card').forEach(card => {
                const start = parseFloat(card.dataset.start);
                const end = parseFloat(card.dataset.end);
                if (current >= start && current < end) {
                    card.classList.add('glowing-border');
                } else {
                    card.classList.remove('glowing-border');
                }
            });
        }

        function markCardLearned(card, id) {
            State.learnedCards.add(id);
            const badge = card.querySelector('.reward-badge');
            if(badge) badge.innerText = '🌟';
            card.classList.add('animate-bounce-short');
            setTimeout(() => card.classList.remove('animate-bounce-short'), 500);
            updateProgressBar();
        }

        function updateProgressBar() {
            const pct = (State.learnedCards.size / totalLearnableCards) * 100;
            document.getElementById('progress-bar').style.width = pct + '%';
            document.getElementById('progress-text').innerText = `${State.learnedCards.size} / ${totalLearnableCards}`;
            
            if (State.learnedCards.size === totalLearnableCards && totalLearnableCards > 0) {
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            }
        }

        // --- 渲染 HTML 內容 ---
        function formatTime(sec) {
            const m = Math.floor(sec / 60).toString().padStart(2, '0');
            const s = Math.floor(sec % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        function genAdjusterHTML(type, val) {
            const isStart = type === 'start';
            const label = isStart ? 'Start' : 'End';
            return `
                <div class="time-adjuster hidden flex items-center bg-gray-100 rounded-lg p-1 space-x-1 border border-gray-200">
                    <span class="text-xs text-gray-500 font-bold ml-1">${label}</span>
                    <button onclick="adjustTime(this.closest('.playable-card').id, '${type}', -1)" class="w-6 h-6 bg-white shadow-sm rounded hover:bg-gray-200 text-sm font-bold">-</button>
                    <span class="${type}-time-disp text-sm font-mono w-10 text-center">${formatTime(val)}</span>
                    <button onclick="adjustTime(this.closest('.playable-card').id, '${type}', 1)" class="w-6 h-6 bg-white shadow-sm rounded hover:bg-gray-200 text-sm font-bold">+</button>
                </div>
            `;
        }

        function renderLesson() {
            const cont = document.getElementById('container-lesson');
            DB.lesson.forEach(item => {
                totalLearnableCards++;
                cont.innerHTML += `
                    <div id="${item.id}" data-start="${item.start}" data-end="${item.end}" onclick="playSegment('${item.id}', 'card')" 
                         class="playable-card relative bg-white rounded-2xl shadow-sm p-4 border border-pink-100 cursor-pointer hover:shadow-md transition group">
                        <div class="absolute top-2 right-2 reward-badge text-xl"></div>
                        <div class="flex justify-between items-start mb-2">
                            <div class="flex gap-2">
                                ${genAdjusterHTML('start', item.start)}
                                ${genAdjusterHTML('end', item.end)}
                            </div>
                            <span class="text-xs text-pink-400 bg-pink-50 px-2 py-1 rounded-full opacity-0 group-hover:opacity-100 transition">▶️ 點擊播放</span>
                        </div>
                        <p class="text-lg font-bold text-gray-800 mb-1 leading-relaxed">${item.en}</p>
                        <p class="chinese-text hidden text-pink-600 text-sm mt-2 border-t border-pink-50 pt-2">${item.zh}</p>
                    </div>
                `;
            });
        }

        function renderVocab(data, containerId, color) {
            const cont = document.getElementById(containerId);
            data.forEach(item => {
                totalLearnableCards++;
                cont.innerHTML += `
                    <div id="${item.id}" data-start="${item.start}" data-end="${item.end}" onclick="playSegment('${item.id}', 'card')" 
                         class="playable-card relative bg-white rounded-2xl shadow-sm p-4 border border-${color}-100 cursor-pointer hover:shadow-md transition group flex flex-col justify-between">
                        <div class="absolute top-2 right-2 reward-badge text-xl"></div>
                        <div>
                            <div class="flex justify-between items-center mb-2">
                                <span class="text-4xl mr-2">${item.emoji}</span>
                                <div class="flex flex-col items-end gap-1">
                                    ${genAdjusterHTML('start', item.start)}
                                    ${genAdjusterHTML('end', item.end)}
                                </div>
                            </div>
                            <div class="flex items-baseline gap-2 mb-2">
                                <h3 class="text-2xl font-black text-${color}-600 tracking-wide">${item.word}</h3>
                                <span class="text-xs font-bold text-gray-400 bg-gray-100 px-2 py-0.5 rounded">${item.pos}</span>
                            </div>
                            <p class="text-sm text-gray-600 italic">"${item.en}"</p>
                        </div>
                        <p class="chinese-text hidden text-${color}-600 font-bold mt-3 border-t border-${color}-50 pt-2">${item.zh}</p>
                    </div>
                `;
            });
        }

        function renderSentences() {
            const cont = document.getElementById('container-sentences');
            DB.sentences.forEach(item => {
                totalLearnableCards++;
                cont.innerHTML += `
                    <div id="${item.id}" data-start="${item.start}" data-end="${item.end}" onclick="playSegment('${item.id}', 'card')" 
                         class="playable-card relative bg-white rounded-2xl shadow-sm p-4 border-l-4 border-l-blue-400 cursor-pointer hover:shadow-md transition group">
                        <div class="absolute top-2 right-2 reward-badge text-xl"></div>
                        <div class="flex gap-2 mb-2">
                            ${genAdjusterHTML('start', item.start)}
                            ${genAdjusterHTML('end', item.end)}
                        </div>
                        <p class="text-lg font-medium text-gray-800 mb-1 leading-relaxed [&>mark]:bg-blue-100 [&>mark]:text-blue-700 [&>mark]:px-1 [&>mark]:rounded">${item.html}</p>
                        <p class="chinese-text hidden text-blue-600 text-sm mt-2 border-t border-blue-50 pt-2">${item.zh}</p>
                    </div>
                `;
            });
        }

        function renderReading() {
            const cont = document.getElementById('container-reading');
            DB.reading.forEach((item, index) => {
                let optionsHTML = item.options.map((opt, i) => `
                    <button onclick="checkAnswer(this, 'reading', ${index}, ${opt.isCorrect})" class="w-full text-left p-3 rounded-xl border border-gray-200 hover:bg-orange-50 hover:border-orange-300 transition flex items-center justify-between group/opt">
                        <div>
                            <span class="font-bold text-gray-700 mr-2">${String.fromCharCode(65 + i)}.</span>
                            <span class="text-gray-800">${opt.en}</span>
                            <div class="chinese-text hidden text-xs text-orange-500 mt-1">${opt.zh}</div>
                        </div>
                        <span onclick="speakText('${opt.en}')" class="opacity-0 group-hover/opt:opacity-100 cursor-pointer text-xl" title="朗讀">🔊</span>
                    </button>
                `).join('');

                cont.innerHTML += `
                    <div class="border-b border-gray-100 pb-6 last:border-0 last:pb-0" id="reading-q${index}">
                        <div class="flex items-start justify-between mb-3 group/q">
                            <div>
                                <h4 class="text-lg font-bold text-gray-800 cursor-pointer" onclick="speakText('${item.q_en.replace(/'/g,"\\'")}')">
                                    <span class="text-orange-500 mr-1">Q${index+1}.</span> ${item.q_en}
                                </h4>
                                <p class="chinese-text hidden text-sm text-orange-500 mt-1">${item.q_zh}</p>
                            </div>
                            <span onclick="speakText('${item.q_en.replace(/'/g,"\\'")}')" class="opacity-0 group-hover/q:opacity-100 cursor-pointer text-2xl" title="朗讀題目">🔊</span>
                        </div>
                        <div class="space-y-2 options-container">
                            ${optionsHTML}
                        </div>
                        <div class="feedback hidden mt-3 p-3 rounded-xl text-sm font-bold">
                            <div class="flex items-center gap-2 mb-1"><span class="icon text-xl"></span><span class="msg"></span></div>
                            <p class="text-gray-600 font-normal exp-en">${item.exp_en}</p>
                            <p class="chinese-text hidden text-orange-500 font-normal mt-1 exp-zh">${item.exp_zh}</p>
                        </div>
                    </div>
                `;
            });
        }

        function renderListening() {
            const cont = document.getElementById('container-listening');
            DB.listening.forEach((item, index) => {
                let optionsHTML = item.options.map((opt, i) => `
                    <button onclick="checkAnswer(this, 'listening', ${index}, ${opt.isCorrect})" class="w-full text-left p-3 rounded-xl border border-gray-200 hover:bg-indigo-50 hover:border-indigo-300 transition group/opt">
                        <span class="font-bold text-gray-700 mr-2">${String.fromCharCode(65 + i)}.</span>
                        <span class="text-gray-800">${opt.en}</span>
                        <div class="chinese-text hidden text-xs text-indigo-500 mt-1">${opt.zh}</div>
                    </button>
                `).join('');

                cont.innerHTML += `
                    <div class="playable-card pb-6 mb-6 border-b border-gray-100 last:border-0 last:pb-0 last:mb-0" id="${item.id}" data-start="${item.start}" data-end="${item.end}">
                        <div class="flex items-center justify-between mb-4 bg-indigo-50 p-3 rounded-xl cursor-pointer hover:bg-indigo-100 transition" onclick="playSegment('${item.id}', 'listening')">
                            <div class="font-bold text-indigo-700 flex items-center gap-2">
                                <span class="bg-indigo-500 text-white w-6 h-6 flex items-center justify-center rounded-full text-sm">${index+1}</span>
                                點擊播放聽力片段 🎧
                            </div>
                            <div class="flex gap-2">
                                ${genAdjusterHTML('start', item.start)}
                                ${genAdjusterHTML('end', item.end)}
                            </div>
                        </div>
                        <div class="space-y-2 options-container pl-2">
                            ${optionsHTML}
                        </div>
                        <div class="feedback hidden mt-3 p-3 rounded-xl text-sm font-bold pl-2">
                            <div class="flex items-center gap-2 mb-1"><span class="icon text-xl"></span><span class="msg"></span></div>
                            <p class="text-gray-600 font-normal exp-en">${item.exp_en}</p>
                            <p class="chinese-text hidden text-indigo-500 font-normal mt-1 exp-zh">${item.exp_zh}</p>
                        </div>
                    </div>
                `;
            });
        }

        // --- 互動邏輯 ---
        function checkAnswer(btn, type, index, isCorrect) {
            const container = btn.closest('.options-container').parentElement;
            const feedback = container.querySelector('.feedback');
            const btns = container.querySelectorAll('.options-container button');
            
            // Disable all buttons in this question
            btns.forEach(b => {
                b.onclick = null;
                b.classList.add('opacity-60', 'cursor-default');
                b.classList.remove('hover:bg-orange-50', 'hover:border-orange-300', 'hover:bg-indigo-50', 'hover:border-indigo-300');
            });
            
            // Highlight chosen
            btn.classList.remove('opacity-60');
            btn.classList.add('ring-2', 'ring-offset-1');
            
            feedback.classList.remove('hidden');
            
            if(isCorrect) {
                btn.classList.add('bg-green-100', 'border-green-400', 'ring-green-400');
                feedback.classList.add('bg-green-50', 'border', 'border-green-200');
                feedback.querySelector('.icon').innerText = '🟢';
                feedback.querySelector('.msg').innerText = 'Correct! 答對了！';
                feedback.querySelector('.msg').classList.add('text-green-700');
                
                if(type === 'reading') {
                    State.readingScore++;
                    if(State.readingScore === DB.reading.length) triggerWin('閱讀理解小達人');
                } else {
                    State.listeningScore++;
                    if(State.listeningScore === DB.listening.length) triggerWin('聽力測驗小達人');
                }
            } else {
                btn.classList.add('bg-red-100', 'border-red-400', 'ring-red-400');
                feedback.classList.add('bg-red-50', 'border', 'border-red-200');
                feedback.querySelector('.icon').innerText = '🔴';
                feedback.querySelector('.msg').innerText = 'Incorrect! 再接再厲！';
                feedback.querySelector('.msg').classList.add('text-red-700');
                
                // Show correct answer
                btns.forEach((b, i) => {
                    let dbRef = type === 'reading' ? DB.reading[index].options : DB.listening[index].options;
                    if(dbRef[i].isCorrect) {
                        b.classList.remove('opacity-60');
                        b.classList.add('bg-green-50', 'border-green-300', 'border-dashed', 'border-2');
                    }
                });
            }
            
            // Sync current chinese state
            if(State.showChinese) {
                feedback.querySelector('.chinese-text').classList.remove('hidden');
            }
        }

        function triggerWin(title) {
            confetti({ particleCount: 200, spread: 100, origin: { y: 0.5 }, zIndex: 100 });
            setTimeout(() => {
                alert(`🌟🌟🌟🌟🌟\n恭喜你！${title}！\n全數答對！`);
            }, 500);
        }

        // --- 全局控制邏輯 ---
        function toggleChinese() {
            State.showChinese = !State.showChinese;
            document.querySelectorAll('.chinese-text').forEach(el => {
                if(State.showChinese) el.classList.remove('hidden');
                else el.classList.add('hidden');
            });
        }

        function toggleAdjusters() {
            State.showAdjusters = !State.showAdjusters;
            document.querySelectorAll('.time-adjuster').forEach(el => {
                if(State.showAdjusters) el.classList.remove('hidden');
                else el.classList.add('hidden');
            });
        }

        function changeFontSize(delta) {
            State.fontSize += delta * 2;
            if(State.fontSize < 12) State.fontSize = 12;
            if(State.fontSize > 24) State.fontSize = 24;
            document.getElementById('app-body').style.fontSize = State.fontSize + 'px';
        }

        function exportData() {
            // 只匯出有調整時間的區域
            const exportObj = {
                lesson: DB.lesson.map(x => ({ text: x.en, start: x.start, end: x.end })),
                vocab: DB.basicVocab.concat(DB.advVocab).map(x => ({ word: x.word, start: x.start, end: x.end })),
                sentences: DB.sentences.map(x => ({ text: x.en, start: x.start, end: x.end })),
                listening: DB.listening.map(x => ({ q_id: x.id, start: x.start, end: x.end }))
            };
            const jsonStr = JSON.stringify(exportObj, null, 2);
            navigator.clipboard.writeText(jsonStr).then(() => {
                alert("✅ 所有時間設定與原始句子已成功以 JSON 格式複製到剪貼簿！");
            }).catch(err => {
                alert("匯出失敗，請手動複製控制台中的內容。");
                console.log(jsonStr);
            });
        }

        // 面板開關
        document.getElementById('toggle-panel-btn').addEventListener('click', function() {
            const panel = document.getElementById('control-panel');
            const icon = document.getElementById('panel-icon');
            if (panel.classList.contains('hidden')) {
                panel.classList.remove('hidden');
                icon.classList.add('rotate-180');
            } else {
                panel.classList.add('hidden');
                icon.classList.remove('rotate-180');
            }
        });

        // --- 拖曳分隔線邏輯 ---
        const resizer = document.getElementById('resizer');
        const leftPanel = document.getElementById('left-panel');
        const rightPanel = document.getElementById('right-panel');
        const iframeCover = document.getElementById('iframe-cover');
        let isResizing = false;

        resizer.addEventListener('mousedown', (e) => {
            isResizing = true;
            iframeCover.classList.remove('hidden'); // 遮蔽 iframe 避免吃掉事件
            document.body.style.cursor = 'col-resize';
            document.body.classList.add('no-select');
        });

        window.addEventListener('mousemove', (e) => {
            if (!isResizing) return;
            // 計算新寬度百分比
            const newWidth = (e.clientX / window.innerWidth) * 100;
            if(newWidth > 20 && newWidth < 80) {
                leftPanel.style.width = `${newWidth}%`;
                rightPanel.style.width = `${100 - newWidth}%`;
            }
        });

        window.addEventListener('mouseup', () => {
            if(isResizing) {
                isResizing = false;
                iframeCover.classList.add('hidden');
                document.body.style.cursor = 'default';
                document.body.classList.remove('no-select');
            }
        });

        // --- 初始化啟動 ---
        window.onload = () => {
            renderLesson();
            renderVocab(DB.basicVocab, 'container-basic-vocab', 'green');
            renderVocab(DB.advVocab, 'container-adv-vocab', 'purple');
            renderSentences();
            renderReading();
            renderListening();
            updateProgressBar();
        };

    </script>
</body>
</html>
